<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Sim</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
  canvas { display: block; }
  :root {
    --crt-bg:#000812; --crt-panel:#001a2a; --crt-border:#00ffe7;
    --crt-teal:#00ffe7; --crt-teal-dim:#4ecdc4; --crt-white:#e8f4f0;
    --crt-danger:#ff4444; --crt-star:#ffcc44;
    --crt-glow:0 0 8px #00ffe799, 0 0 18px #00ffe733;
    --crt-font:"Courier New",Courier,monospace;
  }
  #planet-menu,#star-menu {
    display:none; flex-direction:column; gap:0; position:fixed; z-index:9999;
    font-family:var(--crt-font); font-size:12px; color:var(--crt-white);
    background-image:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,0,0,0.18) 3px,rgba(0,0,0,0.18) 4px);
    clip-path:polygon(0 10px,10px 0,calc(100% - 10px) 0,100% 10px,100% calc(100% - 10px),calc(100% - 10px) 100%,10px 100%,0 calc(100% - 10px));
    animation:crt-flicker 8s infinite;
  }
  #planet-menu { width:238px; background:var(--crt-bg); border:1px solid var(--crt-border); box-shadow:var(--crt-glow),inset 0 0 40px #00ffe708; }
  #star-menu   { width:248px; background:#080400; border:1px solid #ffcc44; box-shadow:0 0 8px #ffcc4499,0 0 18px #ffcc4433,inset 0 0 40px #ffcc4408; }
  @keyframes crt-flicker { 0%,94%,96%,100%{opacity:1} 95%{opacity:0.88} }
  #planet-menu-header,#star-menu-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:7px 10px 6px; border-bottom:1px solid #00ffe733; background:#00ffe709;
  }
  #star-menu-header { border-bottom:1px solid #ffcc4433; background:#ffcc4409; }
  #planet-menu-title { font-size:10px; letter-spacing:5px; color:var(--crt-teal); text-shadow:0 0 10px #00ffe7aa; text-transform:uppercase; }
  #star-menu-title   { font-size:10px; letter-spacing:5px; color:#ffcc44; text-shadow:0 0 10px #ffcc44aa; text-transform:uppercase; }
  #planet-menu-title::after,#star-menu-title::after { content:"_"; animation:crt-blink 1.1s step-end infinite; }
  @keyframes crt-blink { 0%,100%{opacity:1} 50%{opacity:0} }
  #planet-menu-header::before,#planet-menu-header::after { content:"◆"; font-size:6px; color:var(--crt-teal); opacity:0.5; }
  #star-menu-header::before,#star-menu-header::after     { content:"★"; font-size:6px; color:#ffcc44; opacity:0.5; }
  #planet-menu-body,#star-menu-body { padding:10px 10px 8px; display:flex; flex-direction:column; gap:5px; }
  .pm-row { display:flex; align-items:center; gap:6px; }
  .pm-label { width:52px; flex-shrink:0; font-size:9px; letter-spacing:3px; color:var(--crt-teal-dim); text-transform:uppercase; }
  .sm-label { width:52px; flex-shrink:0; font-size:9px; letter-spacing:3px; color:#cc9922; text-transform:uppercase; }
  .pm-input,.sm-input {
    flex:1; font-family:var(--crt-font); font-size:12px;
    padding:3px 6px; outline:none; transition:border-color 0.15s,box-shadow 0.15s;
    clip-path:polygon(0 4px,4px 0,calc(100% - 4px) 0,100% 4px,100% calc(100% - 4px),calc(100% - 4px) 100%,4px 100%,0 calc(100% - 4px));
  }
  .pm-input { background:#00ffe70a; border:1px solid #00ffe733; color:var(--crt-white); }
  .pm-input:focus { border-color:var(--crt-teal); box-shadow:0 0 6px #00ffe766; background:#00ffe714; }
  .sm-input { background:#ffcc440a; border:1px solid #ffcc4433; color:var(--crt-white); }
  .sm-input:focus { border-color:#ffcc44; box-shadow:0 0 6px #ffcc4466; background:#ffcc4414; }
  .pm-input::-webkit-inner-spin-button,.pm-input::-webkit-outer-spin-button,
  .sm-input::-webkit-inner-spin-button,.sm-input::-webkit-outer-spin-button { -webkit-appearance:none; }
  .pm-input[type=number],.sm-input[type=number] { -moz-appearance:textfield; }
  /* readonly velocity display - shows live value, click to enable edit */
  .pm-input.live-display { cursor:text; border-style:dashed; }
  .sm-input.live-display { cursor:text; border-style:dashed; }
  /* info row - gravity/temp display */
  .pm-info-row { display:flex; align-items:center; gap:6px; background:#00ffe708; border:1px solid #00ffe722; padding:3px 6px;
    clip-path:polygon(0 4px,4px 0,calc(100% - 4px) 0,100% 4px,100% calc(100% - 4px),calc(100% - 4px) 100%,4px 100%,0 calc(100% - 4px)); }
  .sm-info-row { display:flex; align-items:center; gap:6px; background:#ffcc4408; border:1px solid #ffcc4422; padding:3px 6px;
    clip-path:polygon(0 4px,4px 0,calc(100% - 4px) 0,100% 4px,100% calc(100% - 4px),calc(100% - 4px) 100%,4px 100%,0 calc(100% - 4px)); }
  .pm-info-label { font-size:9px; letter-spacing:2px; color:var(--crt-teal-dim); text-transform:uppercase; white-space:nowrap; flex-shrink:0; }
  .sm-info-label { font-size:9px; letter-spacing:2px; color:#cc9922; text-transform:uppercase; white-space:nowrap; flex-shrink:0; }
  .pm-info-val { flex:1; text-align:right; font-size:11px; color:#7ef7ff; text-shadow:0 0 8px #7ef7ff88; }
  .sm-info-val { flex:1; text-align:right; font-size:11px; color:#ffdd66; text-shadow:0 0 8px #ffdd6688; }
  /* editable temp field inline */
  .pm-temp-input,.sm-temp-input {
    width:58px; font-family:var(--crt-font); font-size:11px; padding:1px 4px; outline:none;
    clip-path:polygon(0 3px,3px 0,calc(100% - 3px) 0,100% 3px,100% calc(100% - 3px),calc(100% - 3px) 100%,3px 100%,0 calc(100% - 3px));
    text-align:right;
  }
  .pm-temp-input { background:#00ffe710; border:1px solid #00ffe740; color:#7ef7ff; }
  .pm-temp-input:focus { border-color:var(--crt-teal); box-shadow:0 0 4px #00ffe744; }
  .sm-temp-input { background:#ffcc4410; border:1px solid #ffcc4440; color:#ffdd66; }
  .sm-temp-input:focus { border-color:#ffcc44; box-shadow:0 0 4px #ffcc4444; }
  .pm-temp-input::-webkit-inner-spin-button,.sm-temp-input::-webkit-inner-spin-button,
  .pm-temp-input::-webkit-outer-spin-button,.sm-temp-input::-webkit-outer-spin-button { -webkit-appearance:none; }
  .pm-temp-input[type=number],.sm-temp-input[type=number] { -moz-appearance:textfield; }
  /* bar */
  .pm-bar-wrap { height:3px; background:#00ffe718; }
  .pm-bar { height:3px; background:linear-gradient(to right,#00ffe7,#7ef7ff); width:0%; transition:width 0.15s; }
  .sm-bar-wrap { height:3px; background:#ffcc4418; }
  .sm-bar { height:3px; background:linear-gradient(to right,#ffcc44,#ffdd66); width:0%; transition:width 0.15s; }
  /* temp bar - color-coded hot/cold */
  .temp-bar-wrap { height:3px; background:#ffffff18; }
  .temp-bar { height:3px; width:50%; transition:width 0.2s,background 0.3s; }
  .pm-divider { height:1px; background:linear-gradient(to right,transparent,#00ffe744,transparent); margin:3px 0 1px; }
  .sm-divider { height:1px; background:linear-gradient(to right,transparent,#ffcc4444,transparent); margin:3px 0 1px; }
  .pm-btn-row,.sm-btn-row { display:flex; gap:6px; }
  .pm-btn,.sm-btn {
    flex:1; padding:5px 4px; font-family:var(--crt-font); font-size:9px;
    letter-spacing:3px; text-transform:uppercase; cursor:pointer;
    border:1px solid currentColor; background:transparent;
    transition:background 0.12s,box-shadow 0.12s,color 0.12s;
    clip-path:polygon(0 4px,4px 0,calc(100% - 4px) 0,100% 4px,100% calc(100% - 4px),calc(100% - 4px) 100%,4px 100%,0 calc(100% - 4px));
  }
  .pm-btn-primary{color:var(--crt-teal)} .pm-btn-primary:hover{background:#00ffe718;box-shadow:0 0 8px #00ffe766;color:#fff}
  .pm-btn-secondary{color:var(--crt-teal-dim)} .pm-btn-secondary:hover{background:#4ecdc418;color:#fff}
  .pm-btn-danger{color:var(--crt-danger);border-color:var(--crt-danger)} .pm-btn-danger:hover{background:#ff444418;box-shadow:0 0 8px #ff444466;color:#ffaaaa}
  .pm-btn-full{width:100%;flex:none}
  .sm-btn-star{color:#ffcc44} .sm-btn-star:hover{background:#ffcc4418;box-shadow:0 0 8px #ffcc4466;color:#fff}
  .sm-btn-system{color:#ffaa22} .sm-btn-system:hover{background:#ffaa2218;box-shadow:0 0 8px #ffaa2266;color:#fff}
  .sm-btn-binary{color:#ff88ff;border-color:#ff88ff} .sm-btn-binary:hover{background:#ff88ff18;box-shadow:0 0 8px #ff88ff66;color:#fff}
  .sm-btn-danger{color:var(--crt-danger);border-color:var(--crt-danger)} .sm-btn-danger:hover{background:#ff444418;box-shadow:0 0 8px #ff444466;color:#ffaaaa}
  #planet-menu-footer { padding:4px 10px 6px; border-top:1px solid #00ffe722; font-size:8px; letter-spacing:3px; color:#00ffe755; text-align:center; }
  #star-menu-footer   { padding:4px 10px 6px; border-top:1px solid #ffcc4422; font-size:8px; letter-spacing:3px; color:#ffcc4455; text-align:center; }
</style>
</head>
<body>

<!-- Planet editor menu -->
<div id="planet-menu">
  <div id="planet-menu-header"><span id="planet-menu-title">BODY EDIT</span></div>
  <div id="planet-menu-body">
    <div class="pm-row">
      <span class="pm-label">Radius</span>
      <input id="planet-radius" class="pm-input" type="number" step="1" value="0">
    </div>
    <div class="pm-row">
      <span class="pm-label">Vx</span>

<!-- Star editor menu -->
<div id="star-menu">

  <div id="star-menu-body">

      <span class="sm-label">Radius</span>

    <div class="pm-row">
      <span class="sm-label">Vx</span>

    </div>

<script>
// =============================================================================
//  GAME SETTINGS
// =============================================================================
const GameSettings = {
    screenShake:true, explosions:true, showPerfPanel:true,
    save() { try{localStorage.setItem('game-settings',JSON.stringify({screenShake:this.screenShake,explosions:this.explosions,showPerfPanel:this.showPerfPanel}));}catch(e){} },
    load() { try{const d=JSON.parse(localStorage.getItem('game-settings')||'{}');if(typeof d.screenShake==='boolean')this.screenShake=d.screenShake;if(typeof d.explosions==='boolean')this.explosions=d.explosions;if(typeof d.showPerfPanel==='boolean')this.showPerfPanel=d.showPerfPanel;}catch(e){} },
};
GameSettings.load();

// =============================================================================
//  CONSTANTS
// =============================================================================
const PHY = {
    G:600, SOFT:20,
    // For opening screen only (spatial hash gravity)
    MAX_GRAV_D:10000, GRAV_CELL:1600, GRAV_REF_MASS:50, GRAV_RANGE_MAX:4,
    GRID_CELL:260,
    MERGE_FRAC:0.30, BOUNCE_E:0.35,
    DEBRIS_LIFE_MS:14000, DEBRIS_MASS_MIN:1.5,
    MAX_BODIES:200,      // non-debris cap
    MAX_DEBRIS:120,      // debris cap (separate)
    MAX_FRAGS:20,
    MIN_SEP_SPEED:0.5,
    ROCHE_GRIND_FRAMES:8, ROCHE_FAST_THRESH:15,
    // Debris promotion
    DEBRIS_PROMOTE_RADIUS:9, DEBRIS_PROMOTE_MASS:14,
    // Stars
    STAR_MIN_RADIUS:80, STAR_MAX_RADIUS:500,
    // Heating radii fraction (visual glow extends to ~2.75× star radius)
    STAR_HEAT_RADIUS_FRAC:2.4,
    // Temperature thresholds (Kelvin, abstract)
    TEMP_ICE_TO_TERRAN:  273,    // ice melts → terran
    TEMP_TERRAN_TO_LAVA: 800,    // terran heats → lava
    // Star baseline temperature
    STAR_BASE_TEMP: 5500,
    // Planet baseline temperature (space background)
    PLANET_SPACE_TEMP: 10,
    // Heat decay rate per second (how fast temp approaches target)
    TEMP_CHANGE_RATE: 120,
    // Gravity display ref
    GRAV_DISPLAY_REF:10000,
};

// =============================================================================
//  HELPERS
// =============================================================================
function surfaceGravity(body) {
    // G * M / r² — but gravity strength = G * M (range is infinite, force = G*M/r²)
    // Display "gravitational strength" as G*M (proportional to mass)
    return PHY.G * body.mass;
}
function formatGravity(g) {
    if (g>=1e9)  return (g/1e9).toFixed(2)+' Gg';
    if (g>=1e6)  return (g/1e6).toFixed(2)+' Mg';
    if (g>=1000) return (g/1000).toFixed(2)+' kg';
    return g.toFixed(0)+' g';
}
function gravBarFraction(g) {
    if (g<=0) return 0;
    const lo=Math.log10(1), hi=Math.log10(PHY.G*1e7);
    return Math.max(0,Math.min(1,(Math.log10(g)-lo)/(hi-lo)));
}
function tempColor(t) {
    // Returns CSS color string for temperature bar
    if (t < PHY.TEMP_ICE_TO_TERRAN) return `hsl(${200+Math.max(0,40*(1-t/PHY.TEMP_ICE_TO_TERRAN))},80%,60%)`;
    if (t < PHY.TEMP_TERRAN_TO_LAVA) {
        const f=(t-PHY.TEMP_ICE_TO_TERRAN)/(PHY.TEMP_TERRAN_TO_LAVA-PHY.TEMP_ICE_TO_TERRAN);
        return `hsl(${120-f*80},70%,50%)`;
    }
    const f=Math.min(1,(t-PHY.TEMP_TERRAN_TO_LAVA)/2000);
    return `hsl(${40-f*40},100%,${60-f*20}%)`;
}
function tempBarFraction(t) {
    return Math.max(0,Math.min(1,t/(PHY.STAR_BASE_TEMP*1.2)));
}

// =============================================================================
//  DEBRIS POOL
// =============================================================================
class DebrisPool {
    constructor(scene, capacity) {
        this.scene = scene;
        this.slots = [];
        for (let i = 0; i < capacity; i++) {
            const spr = scene.add.circle(0,0,2,0xffffff,0);
            spr.setDepth(0).setVisible(false);
            this.slots.push({spr,active:false});
        }
    }
    acquire(x,y,r,color) {
        const slot=this.slots.find(s=>!s.active);
        if (!slot) return null;
        slot.active=true;
        slot.spr.setPosition(x,y).setRadius(r).setFillStyle(color,1).setVisible(true).setAlpha(1);
        return slot;
    }
    release(slot) { if(!slot)return; slot.active=false; slot.spr.setVisible(false); }
    releaseAll()  { for(const s of this.slots){s.active=false;s.spr.setVisible(false);} }
}

// =============================================================================
//  STAR TEXTURE GENERATOR
// =============================================================================
class StarTextureGen {
    static _rng(seed) {
        let s = seed | 0;
        return () => {
            s = (Math.imul(1664525, s) + 1013904223) | 0;
            return (s >>> 0) / 4294967296;
        };
    }
    static _rgba(hex, a = 1) {
        const r = (hex >> 16) & 0xff, g = (hex >> 8) & 0xff, b = hex & 0xff;
        return `rgba(${r},${g},${b},${a})`;
    }

    static generate(scene, radius, seed) {
        const r = Math.max(20, Math.round(radius));
        const key = `stex-${seed}-r${r}`;
        if (scene.textures.exists(key)) return key;
        const rng  = StarTextureGen._rng(seed);
        const size = r * 2;

        // Pick star type based on seed
        const typeRoll = rng();
        let type;
        if (typeRoll < 0.5)      type = 'yellow';   // G-type
        else if (typeRoll < 0.75) type = 'orange';  // K-type
        else if (typeRoll < 0.88) type = 'blue';    // B-type
        else if (typeRoll < 0.95) type = 'red';     // M-type red giant
        else                      type = 'white';   // White dwarf / hot star

        const canvas = document.createElement('canvas');
        canvas.width = canvas.height = size;
        const ctx = canvas.getContext('2d');

        ctx.save();
        ctx.beginPath();
        ctx.arc(r, r, r, 0, Math.PI * 2);
        ctx.clip();

        StarTextureGen._drawStar(ctx, r, rng, type);
        ctx.restore();

        scene.textures.addCanvas(key, canvas);
        return key;
    }

    static _drawStar(ctx, r, rng, type) {
        const size = r * 2;
        const palettes = {
            yellow: { core: 0xfffbe0, mid: 0xffd866, outer: 0xff8800, corona: 0xff6600 },
            orange: { core: 0xfff0d0, mid: 0xffaa44, outer: 0xff6600, corona: 0xff3300 },
            blue:   { core: 0xffffff, mid: 0xccddff, outer: 0x6699ff, corona: 0x4466ff },
            red:    { core: 0xffd0b0, mid: 0xff8844, outer: 0xcc3300, corona: 0x991100 },
            white:  { core: 0xffffff, mid: 0xeeeeff, outer: 0xaabbff, corona: 0x8899ff },
        };
        const pal = palettes[type];

        // Deep base
        const base = ctx.createRadialGradient(r, r, 0, r, r, r);
        base.addColorStop(0,   StarTextureGen._rgba(pal.core, 1));
        base.addColorStop(0.3, StarTextureGen._rgba(pal.mid,  1));
        base.addColorStop(0.7, StarTextureGen._rgba(pal.outer,1));
        base.addColorStop(1,   StarTextureGen._rgba(pal.corona, 0.9));
        ctx.fillStyle = base;
        ctx.fillRect(0, 0, size, size);

        // Granulation / convection cells
        const numCells = 30 + Math.floor(rng() * 40);
        for (let i = 0; i < numCells; i++) {
            const cx = rng() * size;
            const cy = rng() * size;
            const cr = r * (0.04 + rng() * 0.12);
            const brightness = 0.85 + rng() * 0.30;
            const cellGrd = ctx.createRadialGradient(cx, cy, 0, cx, cy, cr);
            cellGrd.addColorStop(0,   StarTextureGen._rgba(pal.core, brightness * 0.4));
            cellGrd.addColorStop(0.5, StarTextureGen._rgba(pal.mid,  brightness * 0.15));
            cellGrd.addColorStop(1,   StarTextureGen._rgba(pal.corona, 0));
            ctx.beginPath();
            ctx.arc(cx, cy, cr, 0, Math.PI * 2);
            ctx.fillStyle = cellGrd;
            ctx.fill();
        }

        // Sunspot regions
        const numSpots = Math.floor(rng() * 6);
        for (let i = 0; i < numSpots; i++) {
            const angle = rng() * Math.PI * 2;
            const dist  = rng() * r * 0.6;
            const sx = r + Math.cos(angle) * dist;
            const sy = r + Math.sin(angle) * dist;
            const sr = r * (0.03 + rng() * 0.07);
            const spotGrd = ctx.createRadialGradient(sx, sy, 0, sx, sy, sr);
            spotGrd.addColorStop(0, 'rgba(0,0,0,0.55)');
            spotGrd.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.beginPath();
            ctx.arc(sx, sy, sr, 0, Math.PI * 2);
            ctx.fillStyle = spotGrd;
            ctx.fill();
        }

        // Limb darkening
        const limb = ctx.createRadialGradient(r, r, r * 0.5, r, r, r);
        limb.addColorStop(0, 'rgba(0,0,0,0)');
        limb.addColorStop(0.7, 'rgba(0,0,0,0.08)');
        limb.addColorStop(1,   'rgba(0,0,0,0.55)');
        ctx.fillStyle = limb;
        ctx.fillRect(0, 0, size, size);

        // Specular hot spot
        const spec = ctx.createRadialGradient(r * 0.62, r * 0.42, 0, r * 0.62, r * 0.42, r * 0.45);
        spec.addColorStop(0,   'rgba(255,255,255,0.28)');
        spec.addColorStop(0.5, 'rgba(255,255,255,0.06)');
        spec.addColorStop(1,   'rgba(255,255,255,0)');
        ctx.fillStyle = spec;
        ctx.fillRect(0, 0, size, size);
    }

    static regenerate(scene, oldKey, radius, seed) {
        if (oldKey && scene.textures.exists(oldKey)) scene.textures.remove(oldKey);
        return StarTextureGen.generate(scene, radius, seed);
    }

    static getGlowColor(seed) {
        const rng = StarTextureGen._rng(seed);
        const typeRoll = rng();
        if (typeRoll < 0.5)       return 0xffaa00;
        else if (typeRoll < 0.75) return 0xff6600;
        else if (typeRoll < 0.88) return 0x4488ff;
        else if (typeRoll < 0.95) return 0xff2200;
        else                      return 0xaabbff;
    }
}


// =============================================================================
//  PLANET TEXTURE GENERATOR
// =============================================================================
class PlanetTextureGen {
    static _rng(seed) {
        let s = seed | 0;
        return () => {
            s = (Math.imul(1664525, s) + 1013904223) | 0;
            return (s >>> 0) / 4294967296;
        };
    }
    static _rgba(hex, a=1) {
        const r=(hex>>16)&0xff, g=(hex>>8)&0xff, b=hex&0xff;
        return `rgba(${r},${g},${b},${a})`;
    }
    static _tint(c, f) {
        return (Math.min(255,Math.round(((c>>16)&0xff)*f))<<16)|
               (Math.min(255,Math.round(((c>>8 )&0xff)*f))<<8)|
                Math.min(255,Math.round((c&0xff)*f));
    }

    static generate(scene, radius, seed, forceType) {
        const r = Math.max(6, Math.round(radius));
        // forceType allows overriding (e.g. 'lava' when heated)
        const typeKey = forceType ? `-${forceType}` : '';
        const key = `ptex-${seed}-r${r}${typeKey}`;
        if (scene.textures.exists(key)) return key;
        const rng  = PlanetTextureGen._rng(seed);
        const size = r * 2;
        let type;
        if (forceType) {
            type = forceType;
        } else if (r >= 80) {
            type = 'gas';
        } else if (r >= 22) {
            type = ['terran','lava','ice','terran'][Math.floor(rng()*4)];
        } else {
            type = 'rocky';
        }
        const canvas = document.createElement('canvas');
        canvas.width = canvas.height = size;
        const ctx = canvas.getContext('2d');
        ctx.save();
        ctx.beginPath();
        ctx.arc(r, r, r, 0, Math.PI*2);
        ctx.clip();
        switch(type) {
            case 'gas':    PlanetTextureGen._drawGas    (ctx, r, rng); break;
            case 'terran': PlanetTextureGen._drawTerran (ctx, r, rng); break;
            case 'lava':   PlanetTextureGen._drawLava   (ctx, r, rng); break;
            case 'ice':    PlanetTextureGen._drawIce    (ctx, r, rng); break;
            case 'rocky':  PlanetTextureGen._drawRocky  (ctx, r, rng); break;
        }
        PlanetTextureGen._drawAtmosphere(ctx, r, type, rng);
        ctx.restore();
        scene.textures.addCanvas(key, canvas);
        return key;
    }

    // Detect the type of a generated texture from its seed/radius
    static detectType(radius, seed) {
        const r = Math.max(6, Math.round(radius));
        if (r >= 80) return 'gas';
        const rng = PlanetTextureGen._rng(seed);
        if (r >= 22) return ['terran','lava','ice','terran'][Math.floor(rng()*4)];
        return 'rocky';
    }

    static _drawGas(ctx, r, rng) {
        const size = r * 2;
        const palettes = [
            [0xc8966e,0xe8b87c,0xd4a068,0xf0d0a0,0xa07040],
            [0x8899cc,0x6677aa,0xaabbdd,0xccddee,0x445588],
            [0xddaa88,0xcc8866,0xeecc99,0xffddaa,0xbb7755],
            [0x99ccaa,0x77aa88,0xbbddcc,0xaaccbb,0x558866],
            [0xcc6644,0xaa4422,0xee8855,0xff9966,0x883322],
        ];
        const pal = palettes[Math.floor(rng() * palettes.length)];
        ctx.fillStyle = PlanetTextureGen._rgba(pal[0]);
        ctx.fillRect(0, 0, size, size);
        const numBands = 6 + Math.floor(rng() * 8);
        for (let i = 0; i < numBands; i++) {
            const yCenter = (i / numBands) * size + rng() * (size / numBands) * 0.5;
            const bandH   = (size / numBands) * (0.3 + rng() * 0.7);
            const col     = pal[Math.floor(rng() * pal.length)];
            const alpha   = 0.4 + rng() * 0.5;
            ctx.beginPath();
            ctx.moveTo(0, yCenter);
            for (let x = 0; x <= size; x += 4) {
                const wave = Math.sin(x * 0.08 + rng() * 6) * bandH * 0.25;
                ctx.lineTo(x, yCenter + wave);
            }
            ctx.lineTo(size, yCenter + bandH);
            ctx.lineTo(0, yCenter + bandH);
            ctx.closePath();
            ctx.fillStyle = PlanetTextureGen._rgba(col, alpha);
            ctx.fill();
        }
        const storms = 1 + Math.floor(rng() * 3);
        for (let i = 0; i < storms; i++) {
            const sx = r*0.3+rng()*r*1.4, sy = r*0.2+rng()*r*1.6;
            const sw = r*(0.12+rng()*0.28), sh = sw*(0.35+rng()*0.3);
            const col = pal[Math.floor(rng() * pal.length)];
            ctx.save(); ctx.translate(sx, sy); ctx.rotate(rng()*0.4-0.2);
            ctx.beginPath(); ctx.ellipse(0,0,sw,sh,0,0,Math.PI*2);
            ctx.fillStyle = PlanetTextureGen._rgba(col, 0.7); ctx.fill();
            ctx.beginPath(); ctx.ellipse(0,0,sw*0.55,sh*0.55,0,0,Math.PI*2);
            ctx.fillStyle = PlanetTextureGen._rgba(PlanetTextureGen._tint(col,1.4), 0.5); ctx.fill();
            ctx.restore();
        }
    }

    static _drawTerran(ctx, r, rng) {
        const size = r * 2;
        const oceanPals = [[0x1a5fa8,0x1e7ac8],[0x0d4d6b,0x147088],[0x2d3561,0x3d4f8a]];
        const op = oceanPals[Math.floor(rng() * oceanPals.length)];
        const grd = ctx.createLinearGradient(0, 0, 0, size);
        grd.addColorStop(0, PlanetTextureGen._rgba(op[0]));
        grd.addColorStop(1, PlanetTextureGen._rgba(op[1]));
        ctx.fillStyle = grd; ctx.fillRect(0, 0, size, size);
        const landPals = [
            [0x3a7d44,0x5a9e5a,0x8bc34a,0xc8b860],
            [0x7a5c3a,0x9a7c5a,0xb89070,0xd4a870],
            [0x4a7a55,0x6aaa65,0x9acd7a,0xd0c87a],
        ];
        const lp = landPals[Math.floor(rng() * landPals.length)];
        const numConts = 2 + Math.floor(rng() * 4);
        for (let i = 0; i < numConts; i++) {
            const cx2=rng()*size, cy2=rng()*size, pts=7+Math.floor(rng()*6), base=r*(0.15+rng()*0.35);
            ctx.beginPath();
            for (let j = 0; j <= pts; j++) {
                const angle=(j/pts)*Math.PI*2, rad=base*(0.6+rng()*0.8);
                const px=cx2+Math.cos(angle)*rad, py=cy2+Math.sin(angle)*rad;
                j===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
            }
            ctx.closePath();
            ctx.fillStyle=PlanetTextureGen._rgba(lp[Math.floor(rng()*lp.length)],0.9); ctx.fill();
        }
        for (let i = 0; i < 12; i++) {
            const cx2=rng()*size, cy2=rng()*size, cw=r*(0.15+rng()*0.4), ch=cw*(0.18+rng()*0.22);
            ctx.beginPath(); ctx.ellipse(cx2,cy2,cw,ch,rng()*Math.PI,0,Math.PI*2);
            ctx.fillStyle=`rgba(255,255,255,${0.15+rng()*0.3})`; ctx.fill();
        }
    }

    static _drawLava(ctx, r, rng) {
        const size = r * 2;
        ctx.fillStyle = PlanetTextureGen._rgba(0x1a0a00); ctx.fillRect(0, 0, size, size);
        const lavaCols = [0xff4400, 0xff7700, 0xffaa00, 0xff2200];
        for (let i = 0; i < 8 + Math.floor(rng()*10); i++) {
            let x=rng()*size, y=rng()*size;
            ctx.beginPath(); ctx.moveTo(x, y);
            for (let s = 0; s < 4+Math.floor(rng()*8); s++) {
                x+=(rng()-0.5)*r*0.5; y+=(rng()-0.5)*r*0.5; ctx.lineTo(x, y);
            }
            const col = lavaCols[Math.floor(rng()*lavaCols.length)];
            ctx.strokeStyle=PlanetTextureGen._rgba(col, 0.7+rng()*0.3); ctx.lineWidth=1+rng()*3; ctx.stroke();
        }
        for (let i = 0; i < 3+Math.floor(rng()*5); i++) {
            const px=rng()*size, py=rng()*size, pr=r*(0.04+rng()*0.15);
            const col=lavaCols[Math.floor(rng()*lavaCols.length)];
            const grd=ctx.createRadialGradient(px,py,0,px,py,pr);
            grd.addColorStop(0,PlanetTextureGen._rgba(0xffffff,0.9));
            grd.addColorStop(0.3,PlanetTextureGen._rgba(col,0.8));
            grd.addColorStop(1,PlanetTextureGen._rgba(col,0));
            ctx.beginPath(); ctx.arc(px,py,pr,0,Math.PI*2); ctx.fillStyle=grd; ctx.fill();
        }
    }

    static _drawIce(ctx, r, rng) {
        const size = r * 2;
        const grd = ctx.createRadialGradient(r*0.6,r*0.4,0,r,r,r*1.2);
        grd.addColorStop(0,'#eef8ff'); grd.addColorStop(0.5,'#c8e8f8'); grd.addColorStop(1,'#88b8d8');
        ctx.fillStyle=grd; ctx.fillRect(0,0,size,size);
        const crackCols=[0x88c8e8,0x6699bb,0xaaddf0,0x4477aa];
        for (let i = 0; i < 20; i++) {
            let x=rng()*size, y=rng()*size;
            ctx.beginPath(); ctx.moveTo(x,y);
            for (let s=0;s<3+Math.floor(rng()*6);s++){x+=(rng()-0.5)*r*0.4;y+=(rng()-0.5)*r*0.4;ctx.lineTo(x,y);}
            const col=crackCols[Math.floor(rng()*crackCols.length)];
            ctx.strokeStyle=PlanetTextureGen._rgba(col,0.4+rng()*0.4);ctx.lineWidth=0.5+rng()*1.5;ctx.stroke();
        }
        for (let i=0;i<25;i++){
            const sx=rng()*size,sy=rng()*size;
            ctx.beginPath();ctx.arc(sx,sy,r*(0.01+rng()*0.04),0,Math.PI*2);
            ctx.fillStyle=`rgba(255,255,255,${0.3+rng()*0.5})`;ctx.fill();
        }
    }

    static _drawRocky(ctx, r, rng) {
        const size = r * 2;
        const hues=[0x888888,0x8a8070,0x707878,0x806868,0x787068];
        const base=hues[Math.floor(rng()*hues.length)];
        const grd=ctx.createRadialGradient(r*0.55,r*0.45,0,r,r,r);
        grd.addColorStop(0,PlanetTextureGen._rgba(PlanetTextureGen._tint(base,1.5)));
        grd.addColorStop(0.5,PlanetTextureGen._rgba(base));
        grd.addColorStop(1,PlanetTextureGen._rgba(PlanetTextureGen._tint(base,0.5)));
        ctx.fillStyle=grd; ctx.fillRect(0,0,size,size);
        for (let i=0;i<60;i++){
            const gx=rng()*size,gy=rng()*size,gr=r*(0.02+rng()*0.07),f=0.7+rng()*0.6;
            ctx.beginPath();ctx.arc(gx,gy,gr,0,Math.PI*2);
            ctx.fillStyle=PlanetTextureGen._rgba(PlanetTextureGen._tint(base,f),0.35);ctx.fill();
        }
        const numCraters=4+Math.floor(rng()*(r<14?5:9));
        for (let i=0;i<numCraters;i++){
            const cx2=r*0.15+rng()*r*1.7,cy2=r*0.15+rng()*r*1.7,cr=r*(0.05+rng()*0.22);
            ctx.beginPath();ctx.arc(cx2,cy2,cr*1.6,0,Math.PI*2);
            ctx.fillStyle=PlanetTextureGen._rgba(PlanetTextureGen._tint(base,1.15),0.25);ctx.fill();
            ctx.beginPath();ctx.arc(cx2,cy2,cr,0,Math.PI*2);
            ctx.strokeStyle=PlanetTextureGen._rgba(PlanetTextureGen._tint(base,1.6),0.7);
            ctx.lineWidth=Math.max(0.5,cr*0.18);ctx.stroke();
            ctx.beginPath();ctx.arc(cx2,cy2,cr*0.78,0,Math.PI*2);
            ctx.fillStyle=PlanetTextureGen._rgba(PlanetTextureGen._tint(base,0.45),0.8);ctx.fill();
        }
    }

    static _drawAtmosphere(ctx, r, type, rng) {
        const atmColors={gas:[0xffffff,0.12],terran:[0x88ccff,0.22],lava:[0xff6600,0.18],ice:[0xaaddff,0.20],rocky:[0x000000,0.0]};
        const [col,maxA]=atmColors[type]||[0xffffff,0.1];
        if (maxA<=0) return;
        const size=r*2;
        const grd=ctx.createRadialGradient(r,r,r*0.72,r,r,r);
        grd.addColorStop(0,PlanetTextureGen._rgba(col,0));
        grd.addColorStop(0.6,PlanetTextureGen._rgba(col,maxA*0.3));
        grd.addColorStop(1,PlanetTextureGen._rgba(col,maxA));
        ctx.fillStyle=grd; ctx.fillRect(0,0,size,size);
    }

    static regenerate(scene, oldKey, radius, seed, forceType) {
        if (oldKey && scene.textures.exists(oldKey)) scene.textures.remove(oldKey);
        return PlanetTextureGen.generate(scene, radius, seed, forceType);
    }

    static shouldHaveRings(radius, seed) {
        const rng = PlanetTextureGen._rng(seed ^ 0xdeadbeef);
        return radius >= 38 && rng() < 0.42;
    }

    static generateRing(scene, radius, seed) {
        const rng=PlanetTextureGen._rng(seed^0xc0ffee);
        const key=`pring-${seed}-r${Math.round(radius)}`;
        if (scene.textures.exists(key)) return key;
        const innerR=radius*(1.28+rng()*0.18), outerR=radius*(2.1+rng()*0.9);
        const tiltY=0.22+rng()*0.22, numBands=3+Math.floor(rng()*4);
        const canvasW=Math.ceil(outerR*2+4), canvasH=Math.ceil(outerR*tiltY*2+4);
        const cx=canvasW/2, cy=canvasH/2;
        const canvas=document.createElement('canvas');
        canvas.width=canvasW; canvas.height=canvasH;
        const ctx=canvas.getContext('2d');
        const ringPalettes=[[0xd4b896,0xc8a878,0xe8d4b0,0xb09070,0x988060],[0x88aacc,0x6688aa,0xaaccee,0x7799bb,0x557799],[0xccccaa,0xbbbb88,0xddddcc,0xaaaaaa,0x999977]];
        const pal=ringPalettes[Math.floor(rng()*ringPalettes.length)];
        for (let b=numBands-1;b>=0;b--) {
            const t0=b/numBands, t1=(b+1)/numBands;
            const r0=innerR+(outerR-innerR)*t0, r1=innerR+(outerR-innerR)*t1;
            const col=pal[b%pal.length], gap=rng()<0.35;
            if (gap&&b>0&&b<numBands-1) continue;
            ctx.beginPath();
            ctx.ellipse(cx,cy,r1,r1*tiltY,0,0,Math.PI*2);
            ctx.ellipse(cx,cy,r0,r0*tiltY,0,0,Math.PI*2);
            ctx.fillStyle=PlanetTextureGen._rgba(col, 0.55+rng()*0.35);
            ctx.fill('evenodd');
        }
        scene.textures.addCanvas(key,canvas);
        return {key,canvasW,canvasH,innerR,outerR,tiltY};
    }

    static regenerateRing(scene, oldKey, radius, seed) {
        if (oldKey && scene.textures.exists(oldKey)) scene.textures.remove(oldKey);
        return PlanetTextureGen.generateRing(scene, radius, seed);
    }
}


// =============================================================================
//  PLANET / STAR BODY
// =============================================================================
class Planet {
    constructor(scene, x, y, opts={}) {
        this.scene    = scene;
        this.planetId = scene.planetCounter++;
        const radius  = (typeof opts.radius==='number'&&opts.radius>0)?opts.radius:Phaser.Math.Between(10,42);
        this.radius   = radius;
        this.isStar   = !!opts.isStar;
        this.mass     = (typeof opts.mass==='number'&&opts.mass>0)?opts.mass
            : this.isStar ? Math.max(10000,radius*radius*1.5) : Math.max(4,radius*radius*0.13);
        this.color    = (typeof opts.color==='number')?opts.color:Phaser.Utils.Array.GetRandom(scene.planetColours);
        this.x=x; this.y=y;
        this.vx=(typeof opts.vx==='number')?opts.vx:0;
        this.vy=(typeof opts.vy==='number')?opts.vy:0;
        this.ax=0; this.ay=0;
        this.isDragged=false; this.mergedThisFrame=false;
        this.isDebris=!!opts.isDebris;
        this.lifetime=this.isDebris?PHY.DEBRIS_LIFE_MS:Infinity;
        this.poolSlot=null; this.sprite=null; this.hitArea=null;
        this.ringBack=null; this.ringFront=null; this.ringMeta=null; this.glowGfx=null;
        this.texSeed=(typeof opts.texSeed==='number')?opts.texSeed:(Math.random()*0x7fffffff)|0;
        this.texKey=null; this._lastTexRadius=0;
        // Planet type & heating — once heated to lava it permanently stays lava
        this._planetType=opts._planetType||null;
        this._currentType=opts._currentType||null; // what it currently looks like
        // Temperature (Kelvin, abstract)
        this.temperature=(typeof opts.temperature==='number')?opts.temperature
            : this.isStar ? PHY.STAR_BASE_TEMP : PHY.PLANET_SPACE_TEMP;

        // Small debris uses pool
        if (this.isDebris && radius<=4) {
            const slot=scene.debrisPool.acquire(x,y,radius,this.color);
            if (slot){this.poolSlot=slot;this.sprite=slot.spr;return;}
        }

        if (this.isStar) {
            this._buildStarSprite(scene,x,y,radius);
        } else if (this.isDebris) {
            this.sprite=scene.add.circle(x,y,radius,this.color);
            this.sprite.setDepth(0);
        } else {
            if (!this._planetType) this._planetType=PlanetTextureGen.detectType(radius,this.texSeed);
            if (!this._currentType) this._currentType=this._planetType;
            this.texKey=PlanetTextureGen.generate(scene,radius,this.texSeed,this._currentType!==this._planetType?this._currentType:undefined);
            this._lastTexRadius=radius;
            this.sprite=scene.add.image(x,y,this.texKey);
            this.sprite.setDepth(1);
            this.sprite.setDisplaySize(radius*2,radius*2);
            if (PlanetTextureGen.shouldHaveRings(radius,this.texSeed)) this._buildRingSprites(scene,x,y,radius);
        }

        if (!this.isDebris) {
            const hitR=radius;
            this.hitArea=scene.add.circle(x,y,hitR,0xffffff,0);
            this.hitArea.setDepth(2);
            this.hitArea.setInteractive({
                hitArea:new Phaser.Geom.Circle(0,0,hitR),
                hitAreaCallback:Phaser.Geom.Circle.Contains,
                useHandCursor:true, draggable:true,
            });
            this.hitArea.on('pointerdown',ptr=>{
                scene.selectPlanet(this);
                if(ptr&&ptr.event)ptr.event.stopPropagation();
                const right=(ptr.event&&ptr.event.button===2)||(typeof ptr.rightButtonDown==='function'&&ptr.rightButtonDown());
                if(right){
                    const ex=(ptr.event&&ptr.event.clientX)||ptr.x;
                    const ey=(ptr.event&&ptr.event.clientY)||ptr.y;
                    if(this.isStar) scene.showStarMenu(ex,ey);
                    else            scene.showPlanetMenu(ex,ey);
                }
            });
            this.hitArea.on('dragstart',()=>{this.isDragged=true;this.vx=this.vy=0;});
            this.hitArea.on('drag',(_p,dx,dy)=>{ if(!this.isDragged)return; this.x=dx;this.y=dy; this._sync();scene.updateSelectionRing(); });
            this.hitArea.on('dragend',()=>{this.isDragged=false;});
        }
    }

    _buildStarSprite(scene,x,y,radius) {
        this.glowGfx=scene.add.graphics(); this.glowGfx.setDepth(0.8);
        this._glowColor=StarTextureGen.getGlowColor(this.texSeed);
        this._updateGlow(x,y,radius);
        this.texKey=StarTextureGen.generate(scene,radius,this.texSeed);
        this._lastTexRadius=radius;
        this.sprite=scene.add.image(x,y,this.texKey);
        this.sprite.setDepth(1.2);
        this.sprite.setDisplaySize(radius*2,radius*2);
    }

    _updateGlow(x,y,radius) {
        if(!this.glowGfx)return;
        this.glowGfx.clear();
        const col=this._glowColor||0xffaa00;
        for(let layer=5;layer>=1;layer--){
            this.glowGfx.fillStyle(col,0.03*layer);
            this.glowGfx.fillCircle(x,y,radius*(1+layer*0.35));
        }
        this.glowGfx.fillStyle(0xffffff,0.08);
        this.glowGfx.fillCircle(x,y,radius*1.05);
    }

    _buildRingSprites(scene,x,y,radius) {
        const meta=PlanetTextureGen.generateRing(scene,radius,this.texSeed);
        this.ringMeta=meta;
        this._makeHalfRingTexture(scene,meta,meta.key+'-back','back');
        this._makeHalfRingTexture(scene,meta,meta.key+'-front','front');
        this.ringBack=scene.add.image(x,y,meta.key+'-back').setDepth(0.5);
        this.ringFront=scene.add.image(x,y,meta.key+'-front').setDepth(1.5);
        this.ringBack.setDisplaySize(meta.canvasW,meta.canvasH);
        this.ringFront.setDisplaySize(meta.canvasW,meta.canvasH);
    }

    _makeHalfRingTexture(scene,meta,key,half) {
        if(scene.textures.exists(key))return;
        const{canvasW,canvasH}=meta;
        const src=scene.textures.get(meta.key).getSourceImage();
        const canvas=document.createElement('canvas');
        canvas.width=canvasW;canvas.height=canvasH;
        const ctx=canvas.getContext('2d');
        ctx.drawImage(src,0,0);
        ctx.globalCompositeOperation='destination-out';
        ctx.fillStyle='black';
        if(half==='back') ctx.fillRect(0,canvasH/2,canvasW,canvasH/2);
        else              ctx.fillRect(0,0,canvasW,canvasH/2);
        scene.textures.addCanvas(key,canvas);
    }

    integrate(dt) {
        if(this.isDragged){this.ax=0;this.ay=0;return;}
        this.vx+=this.ax*dt; this.vy+=this.ay*dt;
        this.x+=this.vx*dt;  this.y+=this.vy*dt;
        this.ax=0; this.ay=0;
        this._sync();
        if(this.isDebris){
            this.lifetime-=dt*1000;
            if(this.sprite)this.sprite.setAlpha(Math.max(0,Math.min(1,this.lifetime/8000)));
        }
        if(this.isStar&&this.glowGfx) this._updateGlow(this.x,this.y,this.radius);
    }

    _sync() {
        if(this.sprite)    this.sprite.setPosition(this.x,this.y);
        if(this.hitArea)   this.hitArea.setPosition(this.x,this.y);
        if(this.ringBack)  this.ringBack.setPosition(this.x,this.y);
        if(this.ringFront) this.ringFront.setPosition(this.x,this.y);
    }

    // Update planet type based on temperature — one-way progression for heating
    // (terran→lava is permanent; cooling doesn't revert lava back)
    updateTypeFromTemp() {
        if(this.isStar||this.isDebris) return;
        const t=this.temperature;
        const base=this._planetType;
        let newType=this._currentType||base;

        if(base==='ice'&&t>=PHY.TEMP_ICE_TO_TERRAN&&newType==='ice') newType='terran';
        if((base==='terran'||newType==='terran')&&t>=PHY.TEMP_TERRAN_TO_LAVA&&newType!=='lava') newType='lava';
        if(base==='ice'&&newType==='terran'&&t<PHY.TEMP_ICE_TO_TERRAN) newType='ice'; // revert ice→terran if cooled
        // lava never reverts

        if(newType!==this._currentType) {
            this._currentType=newType;
            this._rebuildTexture();
        }
    }

    _rebuildTexture() {
        if(this.isStar||this.isDebris||!this.sprite) return;
        const forceType=this._currentType!==this._planetType?this._currentType:undefined;
        if(this.texKey&&this.scene.textures.exists(this.texKey)) this.scene.textures.remove(this.texKey);
        this.texKey=PlanetTextureGen.generate(this.scene,this.radius,this.texSeed,forceType);
        this._lastTexRadius=this.radius;
        this.sprite.setTexture(this.texKey);
        this.sprite.setDisplaySize(this.radius*2,this.radius*2);
        // Flash
        const g=this.scene.add.graphics().setDepth(20);
        let t=0; const ev=this.scene.time.addEvent({delay:16,repeat:18,callback:()=>{
            t+=16;const p=t/288;g.clear();
            g.fillStyle(0xff6600,(1-p)*0.55);g.fillCircle(this.x,this.y,this.radius*(1.1+p));
            if(p>=1){g.destroy();ev.remove();}
        }});
    }

    refreshSprite() {
        if(!this.sprite)return;
        if(this.isStar){
            const chg=Math.abs(this.radius-this._lastTexRadius)/(this._lastTexRadius||1);
            if(chg>0.05){
                this.texKey=StarTextureGen.regenerate(this.scene,this.texKey,this.radius,this.texSeed);
                this._lastTexRadius=this.radius;
                this.sprite.setTexture(this.texKey);
            }
            this.sprite.setDisplaySize(this.radius*2,this.radius*2);
            this._updateGlow(this.x,this.y,this.radius);
        } else if(this.isDebris) {
            if(typeof this.sprite.setRadius==='function') this.sprite.setRadius(this.radius);
        } else {
            const chg=Math.abs(this.radius-this._lastTexRadius)/(this._lastTexRadius||1);
            if(chg>0.05){
                const forceType=this._currentType!==this._planetType?this._currentType:undefined;
                this.texKey=PlanetTextureGen.regenerate(this.scene,this.texKey,this.radius,this.texSeed,forceType);
                this._lastTexRadius=this.radius;
                this.sprite.setTexture(this.texKey);
                this._destroyRingSprites();
                if(PlanetTextureGen.shouldHaveRings(this.radius,this.texSeed)) this._buildRingSprites(this.scene,this.x,this.y,this.radius);
            }
            this.sprite.setDisplaySize(this.radius*2,this.radius*2);
        }
        if(this.hitArea){
            this.hitArea.setRadius(this.radius);
            if(this.hitArea.input) this.hitArea.input.hitArea=new Phaser.Geom.Circle(0,0,this.radius);
        }
    }

    _destroyRingSprites() {
        if(!this.ringBack)return;
        const bk=this.ringBack.texture?.key,fk=this.ringFront?.texture?.key;
        this.ringBack.destroy();
        if(this.ringFront)this.ringFront.destroy();
        if(bk&&this.scene.textures.exists(bk))this.scene.textures.remove(bk);
        if(fk&&this.scene.textures.exists(fk))this.scene.textures.remove(fk);
        if(this.ringMeta?.key&&this.scene.textures.exists(this.ringMeta.key))this.scene.textures.remove(this.ringMeta.key);
        this.ringBack=null;this.ringFront=null;this.ringMeta=null;
    }

    destroy() {
        if(this.poolSlot){this.scene.debrisPool.release(this.poolSlot);this.poolSlot=null;}
        else{
            if(this.sprite) this.sprite.destroy();
            if(this.hitArea)this.hitArea.destroy();
            if(this.glowGfx)this.glowGfx.destroy();
            if(this.texKey&&this.scene.textures.exists(this.texKey))this.scene.textures.remove(this.texKey);
            this._destroyRingSprites();
        }
        this.sprite=null;this.hitArea=null;this.texKey=null;this.glowGfx=null;
    }

    getState() {
        return {x:this.x,y:this.y,radius:this.radius,mass:this.mass,
                vx:this.vx,vy:this.vy,color:this.color,texSeed:this.texSeed,
                isStar:this.isStar,_planetType:this._planetType,
                _currentType:this._currentType,temperature:this.temperature};
    }
    setFriction(){}
}

    _vfxMerge(x,y,r){
        if(!GameSettings.explosions)return;
        const g=this.add.graphics().setDepth(20); let t=0; const dur=300;
        const ev=this.time.addEvent({delay:16,repeat:Math.ceil(dur/16),callback:()=>{
            t+=16; const p=t/dur; g.clear();
            g.fillStyle(0xffffff,(1-p)*0.75); g.fillCircle(x,y,r*(0.5+p*0.7));
            if(p>=1){g.destroy();ev.remove();}
        }});
    }
    _vfxDisrupt(x,y,r){
        if(!GameSettings.explosions)return;
        const g=this.add.graphics().setDepth(20); let t=0; const dur=500;
        const ev=this.time.addEvent({delay:16,repeat:Math.ceil(dur/16),callback:()=>{
            t+=16; const p=t/dur; g.clear();
            g.fillStyle(0xff7700,(1-p)*0.5); g.fillCircle(x,y,r*(1+p*2.2));
            g.lineStyle(3*(1-p),0xffbb00,(1-p)*0.9); g.strokeCircle(x,y,r*(1.3+p*2.8));
            if(p>=1){g.destroy();ev.remove();}
        }});
    }

    static get MAX_OS_BODIES() { return 14; }
    _cellKey(gx,gy){return((gx&0xffff)|((gy&0xffff)<<16))>>>0;}
    _buildGrid(bodies,cs,grid){
        grid.clear();
        for(const b of bodies){
            const k=this._cellKey(Math.floor(b.x/cs),Math.floor(b.y/cs));
            if(!grid.has(k))grid.set(k,[]);
            grid.get(k).push(b);
        }
    }
    _getNeighbors(b,cs,grid){
        const out=this._neighborScratch; out.length=0;
        const gx=Math.floor(b.x/cs),gy=Math.floor(b.y/cs);
        for(let dx=-1;dx<=1;dx++)for(let dy=-1;dy<=1;dy++){
            const cell=grid.get(this._cellKey(gx+dx,gy+dy));
            if(cell)for(const nb of cell)out.push(nb);
        }
        return out;
    }
    _applyGravity(bodies){
        const G=PHY.G,eps2=PHY.SOFT*PHY.SOFT,baseD=PHY.MAX_GRAV_D,refMass=PHY.GRAV_REF_MASS,rangeMax=PHY.GRAV_RANGE_MAX;
        const done=new Set();
        for(const a of bodies){
            for(const b of this._getNeighbors(a,PHY.GRAV_CELL,this._gravGrid)){
                if(b===a)continue;
                const lo=a.planetId<b.planetId?a.planetId:b.planetId;
                const hi=a.planetId<b.planetId?b.planetId:a.planetId;
                const id=(lo<<16)|hi;
                if(done.has(id))continue; done.add(id);
                const dx=b.x-a.x,dy=b.y-a.y,d2=dx*dx+dy*dy;
                const scaleA=Math.min(rangeMax,Math.sqrt(a.mass/refMass));
                const scaleB=Math.min(rangeMax,Math.sqrt(b.mass/refMass));
                if(d2>(baseD*Math.max(scaleA,scaleB))**2)continue;
                const inv=G/Math.pow(d2+eps2,1.5);
                a.ax+=inv*b.mass*dx; a.ay+=inv*b.mass*dy;
                b.ax-=inv*a.mass*dx; b.ay-=inv*a.mass*dy;
            }
        }
    }
    _handleCollisions(bodies){
        for(const b of bodies)b.mergedThisFrame=false;
        const toRemove=[],done=new Set(),activeGrind=new Set();
        for(const a of bodies){
            if(a.mergedThisFrame)continue;
            for(const b of this._getNeighbors(a,PHY.GRID_CELL,this._collGrid)){
                if(b===a||b.mergedThisFrame||a.mergedThisFrame)continue;
                const lo=a.planetId<b.planetId?a.planetId:b.planetId;
                const hi=a.planetId<b.planetId?b.planetId:a.planetId;
                const id=(lo<<16)|hi; if(done.has(id))continue; done.add(id);
                const dx=b.x-a.x,dy=b.y-a.y,dist=Math.sqrt(dx*dx+dy*dy)||0.001;
                const sumR=a.radius+b.radius; if(dist>=sumR)continue;
                const ratio=dist/sumR;
                const [big,sml]=a.mass>=b.mass?[a,b]:[b,a];
                if(ratio<PHY.MERGE_FRAC){
                    this._rocheContacts.delete(id);
                    const mT=a.mass+b.mass, nvx=(a.vx*a.mass+b.vx*b.mass)/mT, nvy=(a.vy*a.mass+b.vy*b.mass)/mT;
                    big.radius=Math.sqrt(big.radius**2+sml.radius**2); big.mass=mT; big.vx=nvx; big.vy=nvy;
                    big.mergedThisFrame=sml.mergedThisFrame=true; toRemove.push(sml);
                    this._vfxMerge((a.x+b.x)*0.5,(a.y+b.y)*0.5,big.radius); continue;
                }
                if(sml.radius<=5){this._bounce(a,b,dx,dy,dist,sumR);continue;}
                activeGrind.add(id);
                const grindCount=(this._rocheContacts.get(id)||0)+1; this._rocheContacts.set(id,grindCount);
                const relVx=sml.vx-big.vx,relVy=sml.vy-big.vy,speed=Math.sqrt(relVx*relVx+relVy*relVy);
                if(speed>=PHY.ROCHE_FAST_THRESH||grindCount>=PHY.ROCHE_GRIND_FRAMES){
                    this._rocheContacts.delete(id);
                    const mT=a.mass+b.mass, nvx=(a.vx*a.mass+b.vx*b.mass)/mT, nvy=(a.vy*a.mass+b.vy*b.mass)/mT;
                    big.radius=Math.sqrt(big.radius**2+sml.radius**2); big.mass=mT; big.vx=nvx; big.vy=nvy;
                    big.mergedThisFrame=sml.mergedThisFrame=true; toRemove.push(sml);
                    this._vfxDisrupt((a.x+b.x)*0.5,(a.y+b.y)*0.5,sml.radius);
                    this._vfxMerge(big.x,big.y,big.radius);
                } else {
                    this._depenetrate(a,b,dx,dy,dist,sumR);
                }
            }
        }
        for(const [pid] of this._rocheContacts)if(!activeGrind.has(pid))this._rocheContacts.delete(pid);
        for(const dead of toRemove)this._removePlanet(dead);
    }
    _depenetrate(a,b,dx,dy,dist,sumR){
        const nx=dx/dist,ny=dy/dist,mT=a.mass+b.mass,ov=sumR-dist;
        a.x-=nx*ov*(b.mass/mT); a.y-=ny*ov*(b.mass/mT);
        b.x+=nx*ov*(a.mass/mT); b.y+=ny*ov*(a.mass/mT);
        a._sync(); b._sync();
    }
    _bounce(a,b,dx,dy,dist,sumR){
        this._depenetrate(a,b,dx,dy,dist,sumR);
        const nx=dx/dist,ny=dy/dist,rvx=b.vx-a.vx,rvy=b.vy-a.vy,vN=rvx*nx+rvy*ny;
        if(vN>=0)return;
        const invM=1/a.mass+1/b.mass,j=-(1+PHY.BOUNCE_E)*vN/invM;
        a.vx-=(j/a.mass)*nx; a.vy-=(j/a.mass)*ny;
        b.vx+=(j/b.mass)*nx; b.vy+=(j/b.mass)*ny;
    }
    _spawnPlanet(opts){
        if(this.planetList.filter(p=>!p.isDebris).length>=OpeningScreen.MAX_OS_BODIES)return null;
        const p=new Planet(this,opts.x,opts.y,opts); this.planetList.push(p); return p;
    }
    _removePlanet(p){
        const i=this.planetList.indexOf(p); if(i!==-1)this.planetList.splice(i,1); p.destroy();
    }
    _wrapPlanets(){
        const sw=this.scale.width,sh=this.scale.height;
        for(const p of this.planetList){
            const r=p.radius+2;
            if(p.x<-r){p.x+=sw+r*2;p._sync();} if(p.x>sw+r){p.x-=sw+r*2;p._sync();}
            if(p.y<-r){p.y+=sh+r*2;p._sync();} if(p.y>sh+r){p.y-=sh+r*2;p._sync();}
        }
    }
    _blendColors(cA,cB,t){
        const rA=(cA>>16)&0xff,gA=(cA>>8)&0xff,bA=cA&0xff;
        const rB=(cB>>16)&0xff,gB=(cB>>8)&0xff,bB=cB&0xff;
        return(Math.round(rA+(rB-rA)*t)<<16)|(Math.round(gA+(gB-gA)*t)<<8)|Math.round(bA+(bB-bA)*t);
    }
    update(time,delta){
        this.stars.children.iterate(star=>{
            star.alpha=star.baseAlpha*(0.6+0.4*Math.sin(time*0.001*star.twinkleSpeed+star.twinklePhase));
        });
        const dt=Math.min(delta,50)/1000, bodies=this.planetList;
        if(bodies.length>0){
            this._buildGrid(bodies,PHY.GRAV_CELL,this._gravGrid);
            this._buildGrid(bodies,PHY.GRID_CELL,this._collGrid);
            this._applyGravity(bodies);
            for(const b of bodies)b.integrate(dt);
            this._handleCollisions(bodies);
            this._wrapPlanets();
        }
    }
    shutdown(){
        for(const p of [...this.planetList])p.destroy();
        this.planetList=[]; this.debrisPool.releaseAll();
    }
}

            const leftArr=this.add.text(cx+40,ry,'◄',{fontFamily:'"Courier New", monospace',fontSize:'13px',color:'#00ffe7'}).setOrigin(0.5).setInteractive({useHandCursor:true});
            const valText=this.add.text(cx+82,ry,s.value,{fontFamily:'"Courier New", monospace',fontSize:'13px',color:'#ffffff',letterSpacing:2}).setOrigin(0.5);
            const rightArr=this.add.text(cx+124,ry,'►',{fontFamily:'"Courier New", monospace',fontSize:'13px',color:'#00ffe7'}).setOrigin(0.5).setInteractive({useHandCursor:true});
            let idx=s.values.indexOf(s.value); this.settingValues[s.label]=s.value;
            const update=()=>{const v=s.values[idx];valText.setText(v);this.settingValues[s.label]=v;if(s.onChange)s.onChange(v);this.tweens.add({targets:valText,alpha:0.2,duration:60,yoyo:true});};
            leftArr.on('pointerdown',()=>{idx=(idx-1+s.values.length)%s.values.length;update();});
            rightArr.on('pointerdown',()=>{idx=(idx+1)%s.values.length;update();});
            [leftArr,rightArr].forEach(btn=>{btn.on('pointerover',()=>btn.setStyle({color:'#ffffff'}));btn.on('pointerout',()=>btn.setStyle({color:'#00ffe7'}));});
        });
        const backY=rowStartY+settings.length*rowSpacing+22;
        const backBg=this.add.rectangle(cx,backY,160,42,0x001a2a).setStrokeStyle(1,0x00ffe7,0.6).setInteractive({useHandCursor:true});
        const backLabel=this.add.text(cx,backY,'← BACK',{fontFamily:'"Courier New", monospace',fontSize:'16px',color:'#00ffe7',letterSpacing:4}).setOrigin(0.5);
        backBg.on('pointerover',()=>{backBg.setFillStyle(0x00ffe7,0.15);backLabel.setStyle({color:'#ffffff'});});
        backBg.on('pointerout', ()=>{backBg.setFillStyle(0x001a2a);backLabel.setStyle({color:'#00ffe7'});});
        backBg.on('pointerdown',()=>{this.cameras.main.fade(200,0,0,0);this.time.delayedCall(200,()=>this.scene.start('OpeningScreen'));});
        this.time.addEvent({delay:Phaser.Math.Between(3000,6000),callback:()=>{this.cameras.main.setAlpha(0.85);this.time.delayedCall(60,()=>this.cameras.main.setAlpha(1));},loop:true});
        this.cameras.main.fadeIn(300,0,0,0);
    }
    _drawCorners(cx,cy,w,h){
        const g=this.add.graphics(); g.lineStyle(2,0x00ffe7,0.7);
        const size=22,pad=16;
        [[pad,pad,1,1],[w-pad,pad,-1,1],[pad,h-pad,1,-1],[w-pad,h-pad,-1,-1]].forEach(([x,y,dx,dy])=>{
            g.beginPath();g.moveTo(x,y+dy*size);g.lineTo(x,y);g.lineTo(x+dx*size,y);g.strokePath();
        });
    }
}

    // ── HUD ───────────────────────────────────────────────────────────────────
    _buildHUD() {

            <div id="mg-speed">SPEED <em id="mg-speed-val">${this.speedFactor}&times;</em></div>
            <div id="mg-perf">

                <em id="mg-bodies">Bodies: 0</em>
                <em id="mg-debris-ct">Debris: 0</em>
            </div>

                Q&nbsp;planet &nbsp;|&nbsp; Z&nbsp;star &nbsp;|&nbsp; E&nbsp;clear &nbsp;|&nbsp;
                F&nbsp;rm debris &nbsp;|&nbsp; R&nbsp;rm offscreen &nbsp;|&nbsp;
                ←/→&nbsp;speed &nbsp;|&nbsp; Space&nbsp;pause &nbsp;|&nbsp;
                WASD&nbsp;pan &nbsp;|&nbsp; Scroll&nbsp;zoom/resize &nbsp;|&nbsp; RClick&nbsp;edit
