// =============================================================================
//  MAIN GAME SCENE
// =============================================================================
class MainGame extends Phaser.Scene {
    constructor() { super('MainGame'); }

    create() {
        this.planetList    = [];
        this.planetCounter = 0;

        this.planetColours = [
            0xff4444, 0xdc143c, 0xff7043, 0xff8c00,
            0xffd700, 0xc8ff40, 0x00e676, 0x1de9b6,
            0x40c4ff, 0x448aff, 0x9c6fff, 0xe040fb,
            0xf48fb1, 0xffffff, 0xaec6cf, 0x80cbc4,
        ];

        // PERF: pool sized to match new MAX_BODIES cap
        this.debrisPool = new DebrisPool(this, 220);

        this.speedFactors      = [0, 0.25, 0.5, 1, 2, 4, 8, 16, 32];
        this.currentSpeedIndex = 3;
        this.speedFactor       = this.speedFactors[this.currentSpeedIndex];

        this._gravGrid = new Map();
        this._collGrid = new Map();
        this._rocheContacts = new Map();

        // PERF: reusable neighbor scratch arrays (one per grid type)
        this._gravScratch = [];
        this._collScratch = [];

        this.selectedPlanet = null;
        this.selectionRing  = this.add.graphics().setDepth(10);
        this.borderGfx      = this.add.graphics().setDepth(999);

        this._buildHUD();

        this._camSpeed = 8;
        this._wKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.W);
        this._aKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.A);
        this._sKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.S);
        this._dKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.D);

        this._kESC   = () => this.scene.start('OpeningScreen');
        this._kLeft  = () => this._changeSpeed(-1);
        this._kRight = () => this._changeSpeed(+1);
        this._kQ     = () => this.addPlanet();
        this._kE     = () => this.clearAllPlanets();
        this._kSpace = () => this._setSpeedZero();

        this.input.keyboard.on('keydown-ESC',   this._kESC);
        this.input.keyboard.on('keydown-LEFT',  this._kLeft);
        this.input.keyboard.on('keydown-RIGHT', this._kRight);
        this.input.keyboard.on('keydown-Q',     this._kQ);
        this.input.keyboard.on('keydown-E',     this._kE);
        this.input.keyboard.on('keydown-SPACE', this._kSpace);

        this.input.on('pointerdown', (_p, objs) => {
            if (!objs || objs.length === 0) this.deselectPlanet();
        });

        this.input.on('wheel', (_p, _o, _dx, dy) => {
            if (this.selectedPlanet) {
                const p      = this.selectedPlanet;
                const factor = dy > 0 ? 0.93 : 1.08;
                p.radius = Math.max(4, Math.min(300, p.radius * factor));
                p.mass   = p.radius * p.radius * 0.13;
                p.refreshSprite();
                this.updateSelectionRing();
                this.scheduleSave();
            } else {
                const z = Phaser.Math.Clamp(
                    this.cameras.main.zoom * (1 - dy * 0.004), 0.07, 5);
                this.cameras.main.setZoom(z);
            }
        });

        document.addEventListener('contextmenu', e => e.preventDefault());
        this._initDomMenu();

        this._saveKey      = 'maingame-v3';
        this._saveTimeout  = null;
        this._lastPerfTime = 0;
        this._frameCount   = 0;

        const sceneData = this.scene.settings.data;
        if (sceneData && sceneData.freshStart === true) {
            try { localStorage.removeItem(this._saveKey); } catch(e) {}
        }

        this.loadPlanets();

        this.events.on('shutdown', () => {
            this.input.keyboard.off('keydown-ESC',   this._kESC);
            this.input.keyboard.off('keydown-LEFT',  this._kLeft);
            this.input.keyboard.off('keydown-RIGHT', this._kRight);
            this.input.keyboard.off('keydown-Q',     this._kQ);
            this.input.keyboard.off('keydown-E',     this._kE);
            this.input.keyboard.off('keydown-SPACE', this._kSpace);
            try { document.removeEventListener('keydown',     this._domKeyListener);  } catch(e){}
            try { document.removeEventListener('pointerdown', this._domOutsideClick); } catch(e){}
            if (this._saveTimeout) clearTimeout(this._saveTimeout);
            this._removeHUD();
        });
    }

    // ── HUD ───────────────────────────────────────────────────────────────────
    _buildHUD() {
        const style = document.createElement('style');
        style.id = 'mg-hud-style';
        style.textContent = `
            #mg-hud {
                position:fixed; inset:0; pointer-events:none; z-index:9000;
                font-family:'Courier New', Courier, monospace;
            }
            #mg-speed {
                position:absolute; top:14px; left:16px;
                font-size:14px; font-weight:bold; letter-spacing:0.08em;
                color:#e0e8ff; text-shadow:0 0 10px #4488ff99;
            }
            #mg-speed em { font-style:normal; color:#7ef7ff; text-shadow:0 0 12px #7ef7ffaa; }
            #mg-perf {
                position:absolute; top:14px; right:16px;
                font-size:13px; text-align:right; letter-spacing:0.05em;
                color:#ffff66; text-shadow:0 0 8px #ffff4466; line-height:1.6;
            }
            #mg-fps    { display:block; }
            #mg-bodies { display:block; color:#aabbcc; }
            #mg-help {
                position:absolute; bottom:10px; left:50%;
                transform:translateX(-50%);
                font-size:11px; color:#ffffff; letter-spacing:0.06em;
                white-space:nowrap; text-shadow:0 1px 4px #000a;
            }
        `;
        document.head.appendChild(style);

        const hud = document.createElement('div');
        hud.id = 'mg-hud';
        hud.innerHTML = `
            <div id="mg-speed">SPEED <em id="mg-speed-val">${this.speedFactor}&times;</em></div>
            <div id="mg-perf">
                <em id="mg-fps">FPS: --</em>
                <em id="mg-bodies">Bodies: 0</em>
            </div>
            <div id="mg-help">
                Q&nbsp;add &nbsp;|&nbsp; E&nbsp;clear &nbsp;|&nbsp;
                ←/→&nbsp;speed &nbsp;|&nbsp; Space&nbsp;pause &nbsp;|&nbsp;
                WASD&nbsp;pan &nbsp;|&nbsp; Scroll&nbsp;zoom/resize &nbsp;|&nbsp; Right-click&nbsp;edit
            </div>
        `;
        document.body.appendChild(hud);

        this._hudSpeedVal = document.getElementById('mg-speed-val');
        this._hudFPS      = document.getElementById('mg-fps');
        this._hudBodies   = document.getElementById('mg-bodies');
    }

    _removeHUD() {
        document.getElementById('mg-hud')?.remove();
        document.getElementById('mg-hud-style')?.remove();
    }

    _updateHUD(n, fps) {
        if (this._hudSpeedVal) this._hudSpeedVal.innerHTML = `${this.speedFactor}&times;`;
        const showPerf = typeof GameSettings === 'undefined' || GameSettings.showPerfPanel;
        const perfEl   = document.getElementById('mg-perf');
        if (perfEl) perfEl.style.display = showPerf ? '' : 'none';
        if (showPerf) {
            if (this._hudBodies) this._hudBodies.textContent = `Bodies: ${n}`;
            if (this._hudFPS) {
                this._hudFPS.textContent = `FPS: ${fps}`;
                const f = parseFloat(fps);
                this._hudFPS.style.color = f >= 50 ? '#44ff88' : f >= 30 ? '#ffaa44' : '#ff4444';
            }
        }
    }

    // ── Update loop ───────────────────────────────────────────────────────────
    update(time, delta) {
        const dt     = (Math.min(delta, 50) * this.speedFactor) / 1000;
        const bodies = this.planetList;
        const n      = bodies.length;

        if (n > 0 && this.speedFactor > 0) {
            this._buildGravGrid(bodies);
            this._buildCollGrid(bodies);
            this._applyGravity(bodies);
            for (let i = 0; i < n; i++) bodies[i].integrate(dt);
            this._handleCollisions();
            this._cleanupDebris();
        }

        if (this.selectedPlanet) this.updateSelectionRing();

        const cam = this.cameras.main;
        const cs  = this._camSpeed / cam.zoom;
        if (this._wKey.isDown) cam.scrollY -= cs;
        if (this._sKey.isDown) cam.scrollY += cs;
        if (this._aKey.isDown) cam.scrollX -= cs;
        if (this._dKey.isDown) cam.scrollX += cs;

        if (this.selectedPlanet && this._menuEl &&
            this._menuEl.style.display !== 'none') {
            if (document.activeElement !== this._inVx)
                this._inVx.value = this.selectedPlanet.vx.toFixed(2);
            if (document.activeElement !== this._inVy)
                this._inVy.value = this.selectedPlanet.vy.toFixed(2);
        }

        const wv = cam.worldView;
        const iz = 1 / cam.zoom;
        this.borderGfx.clear();
        this.borderGfx.lineStyle(2 * iz, 0x2a3a4a, 1);
        this.borderGfx.strokeRect(wv.x + iz, wv.y + iz, wv.width - 2*iz, wv.height - 2*iz);

        this._frameCount++;
        if (time - this._lastPerfTime >= 500) {
            const fps = ((this._frameCount / (time - this._lastPerfTime)) * 1000).toFixed(1);
            this._updateHUD(this.planetList.length, fps);
            this._lastPerfTime = time;
            this._frameCount   = 0;
        }
    }

    // ── Spatial hash ─────────────────────────────────────────────────────────
    _cellKey(gx, gy) { return ((gx & 0xffff) | ((gy & 0xffff) << 16)) >>> 0; }

    _buildGravGrid(bodies) {
        this._gravGrid.clear();
        const cs = PHY.GRAV_CELL;
        for (const b of bodies) {
            const k = this._cellKey(Math.floor(b.x / cs), Math.floor(b.y / cs));
            if (!this._gravGrid.has(k)) this._gravGrid.set(k, []);
            this._gravGrid.get(k).push(b);
        }
    }

    _buildCollGrid(bodies) {
        this._collGrid.clear();
        const cs = PHY.GRID_CELL;
        for (const b of bodies) {
            const k = this._cellKey(Math.floor(b.x / cs), Math.floor(b.y / cs));
            if (!this._collGrid.has(k)) this._collGrid.set(k, []);
            this._collGrid.get(k).push(b);
        }
    }

    // PERF: reusable scratch arrays avoid per-call heap allocation
    _getGravNeighbors(b) {
        const out = this._gravScratch;
        out.length = 0;
        const cs  = PHY.GRAV_CELL;
        const gx  = Math.floor(b.x / cs);
        const gy  = Math.floor(b.y / cs);
        for (let dx = -1; dx <= 1; dx++)
            for (let dy = -1; dy <= 1; dy++) {
                const cell = this._gravGrid.get(this._cellKey(gx+dx, gy+dy));
                if (cell) for (const nb of cell) out.push(nb);
            }
        return out;
    }

    _getCollNeighbors(b) {
        const out = this._collScratch;
        out.length = 0;
        const cs  = PHY.GRID_CELL;
        const gx  = Math.floor(b.x / cs);
        const gy  = Math.floor(b.y / cs);
        for (let dx = -1; dx <= 1; dx++)
            for (let dy = -1; dy <= 1; dy++) {
                const cell = this._collGrid.get(this._cellKey(gx+dx, gy+dy));
                if (cell) for (const nb of cell) out.push(nb);
            }
        return out;
    }

    // ── Gravity ───────────────────────────────────────────────────────────────
    _applyGravity(bodies) {
        const G        = PHY.G;
        const eps2     = PHY.SOFT * PHY.SOFT;
        const baseD    = PHY.MAX_GRAV_D;
        const refMass  = PHY.GRAV_REF_MASS;
        const rangeMax = PHY.GRAV_RANGE_MAX;
        // PERF: integer pair key — no string allocation each frame
        const done = new Set();

        for (const a of bodies) {
            for (const b of this._getGravNeighbors(a)) {
                if (b === a) continue;
                const lo = a.planetId < b.planetId ? a.planetId : b.planetId;
                const hi = a.planetId < b.planetId ? b.planetId : a.planetId;
                // Pack two IDs into one integer; works as long as IDs stay < 65535
                const id = (lo << 16) | hi;
                if (done.has(id)) continue;
                done.add(id);

                const dx = b.x - a.x, dy = b.y - a.y;
                const d2 = dx*dx + dy*dy;

                const scaleA = Math.min(rangeMax, Math.sqrt(a.mass / refMass));
                const scaleB = Math.min(rangeMax, Math.sqrt(b.mass / refMass));
                const reach  = baseD * Math.max(scaleA, scaleB);
                if (d2 > reach * reach) continue;

                const inv = G / Math.pow(d2 + eps2, 1.5);
                a.ax += inv * b.mass * dx;  a.ay += inv * b.mass * dy;
                b.ax -= inv * a.mass * dx;  b.ay -= inv * a.mass * dy;
            }
        }
    }

    // ── Collisions ────────────────────────────────────────────────────────────
    _handleCollisions() {
        const bodies = this.planetList;
        for (const b of bodies) b.mergedThisFrame = false;

        const toRemove         = [];
        const toAdd            = [];
        const done             = new Set();
        const activeGrindPairs = new Set();

        for (const a of bodies) {
            if (a.mergedThisFrame || a.isDragged) continue;

            for (const b of this._getCollNeighbors(a)) {
                if (b === a || b.mergedThisFrame || b.isDragged) continue;

                const lo = a.planetId < b.planetId ? a.planetId : b.planetId;
                const hi = a.planetId < b.planetId ? b.planetId : a.planetId;
                // PERF: integer pair key
                const id = (lo << 16) | hi;
                if (done.has(id)) continue;
                done.add(id);

                const dx   = b.x - a.x, dy = b.y - a.y;
                const dist = Math.sqrt(dx*dx + dy*dy) || 0.001;
                const sumR = a.radius + b.radius;
                if (dist >= sumR) continue;

                const ratio = dist / sumR;

                if (ratio < PHY.MERGE_FRAC) {
                    this._rocheContacts.delete(id);
                    const mT  = a.mass + b.mass;
                    const nvx = (a.vx * a.mass + b.vx * b.mass) / mT;
                    const nvy = (a.vy * a.mass + b.vy * b.mass) / mT;
                    const [big, sml] = a.mass >= b.mass ? [a, b] : [b, a];
                    big.radius = Math.sqrt(big.radius ** 2 + sml.radius ** 2);
                    big.mass   = mT;
                    big.vx = nvx;  big.vy = nvy;
                    big.color = this._blendColors(big.color, sml.color, sml.mass / mT);
                    big.refreshSprite();
                    big.mergedThisFrame = sml.mergedThisFrame = true;
                    toRemove.push(sml);
                    this._vfxMerge((a.x + b.x) * 0.5, (a.y + b.y) * 0.5, big.radius);
                    if (this.selectedPlanet === sml) this.selectPlanet(big);
                    continue;
                }

                const [big, sml] = a.mass >= b.mass ? [a, b] : [b, a];
                const relVx  = sml.vx - big.vx, relVy = sml.vy - big.vy;
                const speed  = Math.sqrt(relVx * relVx + relVy * relVy);

                if (sml.radius <= 5) {
                    this._bounce(a, b, dx, dy, dist, sumR);
                    continue;
                }

                activeGrindPairs.add(id);
                const grindCount = (this._rocheContacts.get(id) || 0) + 1;
                this._rocheContacts.set(id, grindCount);

                const shouldDisrupt =
                    speed      >= PHY.ROCHE_FAST_THRESH ||
                    grindCount >= PHY.ROCHE_GRIND_FRAMES;

                if (shouldDisrupt) {
                    this._rocheContacts.delete(id);
                    big.mergedThisFrame = sml.mergedThisFrame = true;
                    toRemove.push(sml);

                    const pSysX = big.mass * big.vx + sml.mass * sml.vx;
                    const pSysY = big.mass * big.vy + sml.mass * sml.vy;

                    const mAbs    = sml.mass * 0.15;
                    const mEj     = sml.mass * 0.85;
                    const mBigNew = big.mass + mAbs;

                    big.vx = (big.vx * big.mass + sml.vx * mAbs) / mBigNew;
                    big.vy = (big.vy * big.mass + sml.vy * mAbs) / mBigNew;
                    big.mass   = mBigNew;
                    big.radius = Math.sqrt(big.radius ** 2 + (sml.radius * 0.38) ** 2);
                    big.refreshSprite();

                    const debrisPX = pSysX - big.mass * big.vx;
                    const debrisPY = pSysY - big.mass * big.vy;

                    const frags = this._spawnDebris(
                        sml.x, sml.y, sml.vx, sml.vy,
                        mEj, sml.radius, sml.color,
                        dx / dist, dy / dist, speed,
                        debrisPX, debrisPY
                    );
                    for (const f of frags) toAdd.push(f);
                    this._vfxRoche((a.x + b.x) * 0.5, (a.y + b.y) * 0.5, sml.radius);
                    if (this.selectedPlanet === sml) this.selectPlanet(big);
                } else {
                    this._depenetrate(a, b, dx, dy, dist, sumR);
                }
            }
        }

        for (const [pairId] of this._rocheContacts) {
            if (!activeGrindPairs.has(pairId)) this._rocheContacts.delete(pairId);
        }

        for (const dead of toRemove) this._removePlanet(dead);
        for (const opts of toAdd)    this._spawnPlanet(opts);
    }

    _depenetrate(a, b, dx, dy, dist, sumR) {
        const nx = dx / dist, ny = dy / dist;
        const mT = a.mass + b.mass;
        const ov = sumR - dist;
        a.x -= nx * ov * (b.mass / mT);  a.y -= ny * ov * (b.mass / mT);
        b.x += nx * ov * (a.mass / mT);  b.y += ny * ov * (a.mass / mT);
        a._sync(); b._sync();
    }

    _bounce(a, b, dx, dy, dist, sumR) {
        const nx = dx / dist, ny = dy / dist;
        const mT = a.mass + b.mass;
        const ov = sumR - dist;
        a.x -= nx * ov * (b.mass / mT);  a.y -= ny * ov * (b.mass / mT);
        b.x += nx * ov * (a.mass / mT);  b.y += ny * ov * (a.mass / mT);
        a._sync(); b._sync();

        const rvx = b.vx - a.vx, rvy = b.vy - a.vy;
        const vN  = rvx * nx + rvy * ny;
        if (vN >= 0) return;

        const invM = 1 / a.mass + 1 / b.mass;
        const j    = -(1 + PHY.BOUNCE_E) * vN / invM;
        a.vx -= (j / a.mass) * nx;  a.vy -= (j / a.mass) * ny;
        b.vx += (j / b.mass) * nx;  b.vy += (j / b.mass) * ny;

        const rvxP = b.vx - a.vx, rvyP = b.vy - a.vy;
        const vNP  = rvxP * nx + rvyP * ny;
        if (vNP < PHY.MIN_SEP_SPEED) {
            const jC = (PHY.MIN_SEP_SPEED - vNP) / invM;
            a.vx -= (jC / a.mass) * nx;  a.vy -= (jC / a.mass) * ny;
            b.vx += (jC / b.mass) * nx;  b.vy += (jC / b.mass) * ny;
        }
    }

    // ── Debris ────────────────────────────────────────────────────────────────
    _spawnDebris(x, y, pvx, pvy, totalMass, parentR, color, nx, ny, relSpeed,
                 budgetPX, budgetPY) {
        const slots = PHY.MAX_BODIES - this.planetList.length;
        // PERF: cap fragment count more aggressively for large parents
        const parentScale = Math.min(1, parentR / 40);
        const fragCap  = Math.max(4, Math.ceil(parentR * 1.4 * (1 - parentScale * 0.5)));
        const maxF  = Math.min(PHY.MAX_FRAGS, slots, fragCap);
        if (maxF < 2) return [];

        const tx = -ny, ty = nx;
        let mLeft = totalMass;

        const masses = [];
        for (let i = 0; i < maxF; i++) {
            const last = i === maxF - 1;
            let fMass;
            if (last) {
                fMass = mLeft;
            } else {
                const mFrac = 0.04 + Math.random() * 0.22;
                fMass = Math.min(mLeft * mFrac,
                                 mLeft - PHY.DEBRIS_MASS_MIN * (maxF - i - 1));
                fMass = Math.max(PHY.DEBRIS_MASS_MIN, fMass);
            }
            masses.push(fMass);
            mLeft -= fMass;
            if (mLeft < PHY.DEBRIS_MASS_MIN && i < maxF - 2) {
                masses[masses.length - 1] += mLeft;
                mLeft = 0;
                break;
            }
        }

        const rawFrags = [];
        const ejBase   = relSpeed * 0.12 + 6;
        for (let i = 0; i < masses.length; i++) {
            const fMass    = masses[i];
            const areaFrac = fMass / totalMass;
            const fRad     = Math.max(1.2, parentR * Math.sqrt(areaFrac));
            const tSpread  = (Math.random() - 0.5) * 2;
            const rSpread  = (Math.random() - 0.5) * 0.8;
            rawFrags.push({
                x:  x + (Math.random() - 0.5) * parentR * 0.7,
                y:  y + (Math.random() - 0.5) * parentR * 0.7,
                vx: pvx + tx * ejBase * tSpread + nx * ejBase * rSpread + (Math.random() - 0.5) * 4,
                vy: pvy + ty * ejBase * tSpread + ny * ejBase * rSpread + (Math.random() - 0.5) * 4,
                mass: fMass, radius: fRad,
                color: this._tintColor(color, 0.85 + Math.random() * 0.3),
                isDebris: true
            });
        }

        if (budgetPX !== undefined && budgetPY !== undefined) {
            let actualPX = 0, actualPY = 0;
            for (const f of rawFrags) { actualPX += f.mass * f.vx; actualPY += f.mass * f.vy; }
            const dvx = (budgetPX - actualPX) / totalMass;
            const dvy = (budgetPY - actualPY) / totalMass;
            for (const f of rawFrags) { f.vx += dvx; f.vy += dvy; }
        }

        return rawFrags;
    }

    // ── Planet list ───────────────────────────────────────────────────────────
    _spawnPlanet(opts) {
        if (this.planetList.length >= PHY.MAX_BODIES) return null;
        const p = new Planet(this, opts.x, opts.y, opts);
        this.planetList.push(p);
        return p;
    }

    createPlanetAtPosition(x, y, opts = {}) { return this._spawnPlanet({ x, y, ...opts }); }

    addPlanet() {
        const cam = this.cameras.main;
        const wv  = cam.worldView;
        const pad = 80 / cam.zoom;
        this.createPlanetAtPosition(
            Phaser.Math.FloatBetween(wv.x + pad, wv.x + wv.width  - pad),
            Phaser.Math.FloatBetween(wv.y + pad, wv.y + wv.height - pad));
        this.scheduleSave();
    }

    addMoon(parent) {
        if (!parent) return null;
        const moonRadiusFrac  = Phaser.Math.FloatBetween(0.25, 0.45);
        const moonRadius      = Math.max(4, parent.radius * moonRadiusFrac);
        const moonMass        = Math.max(4, moonRadius * moonRadius * 0.13);
        const orbitDist = (parent.radius + moonRadius) * 2.5 + 10;
        const angle     = Phaser.Math.FloatBetween(0, Math.PI * 2);
        const mx        = parent.x + Math.cos(angle) * orbitDist;
        const my        = parent.y + Math.sin(angle) * orbitDist;
        const orbitalSpeed = Math.sqrt(PHY.G * parent.mass / orbitDist);
        const moonVx = parent.vx + (-Math.sin(angle)) * orbitalSpeed;
        const moonVy = parent.vy + ( Math.cos(angle)) * orbitalSpeed;
        const moonColor = this._tintColor(parent.color, Phaser.Math.FloatBetween(0.55, 0.80));
        const moon = this.createPlanetAtPosition(mx, my, {
            radius: moonRadius, mass: moonMass,
            vx: moonVx, vy: moonVy, color: moonColor,
        });
        this.scheduleSave();
        return moon;
    }

    _removePlanet(p) {
        const i = this.planetList.indexOf(p);
        if (i !== -1) this.planetList.splice(i, 1);
        p.destroy();
        if (this.selectedPlanet === p) this.deselectPlanet();
    }

    clearAllPlanets() {
        for (const p of this.planetList) p.destroy();
        this.planetList = [];
        this._rocheContacts.clear();
        this.debrisPool.releaseAll();
        this.deselectPlanet();
        this.scheduleSave();
    }

    _cleanupDebris() {
        // PERF: process at most 20 removals per frame to smooth out GC spikes
        // when many debris pieces expire simultaneously
        let removed = 0;
        const limit = 20;
        for (let i = this.planetList.length - 1; i >= 0 && removed < limit; i--) {
            const p = this.planetList[i];
            if (p.isDebris && (p.lifetime <= 0 || p.mass < PHY.DEBRIS_MASS_MIN)) {
                this.planetList.splice(i, 1);
                p.destroy();
                removed++;
            }
        }
    }

    // ── Selection ─────────────────────────────────────────────────────────────
    selectPlanet(planet) {
        if (this.selectedPlanet === planet) return;
        this.deselectPlanet();
        this.selectedPlanet = planet;
        this.updateSelectionRing();
    }

    deselectPlanet() {
        if (!this.selectedPlanet) return;
        this.selectionRing.clear();
        this.hidePlanetMenu();
        this.selectedPlanet = null;
    }

    updateSelectionRing() {
        if (!this.selectedPlanet) return;
        const p = this.selectedPlanet;
        const r = p.radius + 11;
        this.selectionRing.clear();
        this.selectionRing.lineStyle(2, 0x7ef7ff, 0.85);
        this.selectionRing.strokeCircle(p.x, p.y, r);
        this.selectionRing.lineStyle(1, 0x7ef7ff, 0.45);
        for (let a = 0; a < Math.PI * 2; a += Math.PI / 6) {
            this.selectionRing.lineBetween(
                p.x + Math.cos(a)*(r+2), p.y + Math.sin(a)*(r+2),
                p.x + Math.cos(a)*(r+8), p.y + Math.sin(a)*(r+8));
        }
    }

    // ── VFX ───────────────────────────────────────────────────────────────────
    _vfxMerge(x, y, r) {
        if (typeof GameSettings !== 'undefined' && !GameSettings.explosions) {
            if (typeof GameSettings !== 'undefined' && GameSettings.screenShake)
                this.cameras.main.shake(60, 0.001);
            return;
        }
        const g = this.add.graphics().setDepth(20);
        let t = 0; const dur = 300;
        const ev = this.time.addEvent({ delay: 16, repeat: Math.ceil(dur/16),
            callback: () => {
                t += 16; const p = t/dur;
                g.clear();
                g.fillStyle(0xffffff, (1-p)*0.75);
                g.fillCircle(x, y, r*(0.5 + p*0.7));
                if (p >= 1) { g.destroy(); ev.remove(); }
            }
        });
        if (typeof GameSettings === 'undefined' || GameSettings.screenShake)
            this.cameras.main.shake(100, 0.003);
    }

    _vfxRoche(x, y, r) {
        if (typeof GameSettings !== 'undefined' && !GameSettings.explosions) {
            if (typeof GameSettings !== 'undefined' && GameSettings.screenShake)
                this.cameras.main.shake(40, 0.001);
            return;
        }
        const g = this.add.graphics().setDepth(20);
        let t = 0; const dur = 500;
        const ev = this.time.addEvent({ delay: 16, repeat: Math.ceil(dur/16),
            callback: () => {
                t += 16; const p = t/dur;
                g.clear();
                g.fillStyle(0xff7700, (1-p)*0.5);
                g.fillCircle(x, y, r*(1 + p*2.2));
                g.lineStyle(3*(1-p), 0xffbb00, (1-p)*0.9);
                g.strokeCircle(x, y, r*(1.3 + p*2.8));
                if (p >= 1) { g.destroy(); ev.remove(); }
            }
        });
        if (typeof GameSettings === 'undefined' || GameSettings.screenShake)
            this.cameras.main.shake(70, 0.0025);
    }

    // ── Speed ─────────────────────────────────────────────────────────────────
    _changeSpeed(dir) {
        this.currentSpeedIndex = Phaser.Math.Clamp(
            this.currentSpeedIndex + dir, 0, this.speedFactors.length - 1);
        this.speedFactor = this.speedFactors[this.currentSpeedIndex];
        if (this._hudSpeedVal) this._hudSpeedVal.innerHTML = `${this.speedFactor}&times;`;
    }

    _setSpeedZero() {
        this.currentSpeedIndex = 0;
        this.speedFactor = this.speedFactors[0];
        if (this._hudSpeedVal) this._hudSpeedVal.innerHTML = `${this.speedFactor}&times;`;
    }

    // ── DOM planet editor menu ────────────────────────────────────────────────
    _initDomMenu() {
        this._menuEl = document.getElementById('planet-menu');
        if (!this._menuEl) return;
        this._inVx   = document.getElementById('planet-vx');
        this._inVy   = document.getElementById('planet-vy');
        this._inMass = document.getElementById('planet-mass');

        const applyBtn     = document.getElementById('planet-apply');
        const deleteBtn    = document.getElementById('planet-delete');
        const deleteAllBtn = document.getElementById('planet-delete-all');
        const moonBtn      = document.getElementById('planet-add-moon');

        if (applyBtn) applyBtn.addEventListener('click', () => {
            if (!this.selectedPlanet) return this.hidePlanetMenu();
            const p = this.selectedPlanet;
            p.vx = parseFloat(this._inVx.value)  || 0;
            p.vy = parseFloat(this._inVy.value)   || 0;
            const nm = parseFloat(this._inMass.value);
            if (nm > 0) { p.mass = nm; p.radius = Math.sqrt(nm / 0.13); p.refreshSprite(); }
            this.hidePlanetMenu(); this.scheduleSave();
        });
        if (deleteBtn) deleteBtn.addEventListener('click', () => {
            if (!this.selectedPlanet) return this.hidePlanetMenu();
            const dead = this.selectedPlanet;
            this.deselectPlanet(); this._removePlanet(dead);
            this.hidePlanetMenu(); this.scheduleSave();
        });
        if (deleteAllBtn) deleteAllBtn.addEventListener('click', () => {
            this.clearAllPlanets(); this.hidePlanetMenu();
        });
        if (moonBtn) moonBtn.addEventListener('click', () => {
            if (!this.selectedPlanet || moonBtn.disabled) return;
            moonBtn.disabled = true;
            moonBtn.style.opacity = '0.45';
            this.addMoon(this.selectedPlanet);
            setTimeout(() => {
                moonBtn.disabled = false;
                moonBtn.style.opacity = '';
            }, 600);
        });

        this._domKeyListener = e => { if (e.key === 'Escape') this.hidePlanetMenu(); };
        document.addEventListener('keydown', this._domKeyListener);
        this._domOutsideClick = e => {
            if (!this._menuEl || this._menuEl.contains(e.target)) return;
            this.hidePlanetMenu();
        };
        document.addEventListener('pointerdown', this._domOutsideClick);
    }

    showPlanetMenu(cx, cy) {
        if (!this._menuEl || !this.selectedPlanet) return;
        const p = this.selectedPlanet;
        this._inVx.value   = p.vx.toFixed(2);
        this._inVy.value   = p.vy.toFixed(2);
        this._inMass.value = p.mass.toFixed(2);
        let left = cx + 8, top = cy + 8;
        const vw = window.innerWidth, vh = window.innerHeight;
        this._menuEl.style.display = 'flex';
        const rb = this._menuEl.getBoundingClientRect();
        if (left + rb.width  + 10 > vw) left = vw - rb.width  - 10;
        if (top  + rb.height + 10 > vh) top  = vh - rb.height - 10;
        this._menuEl.style.left = `${left}px`;
        this._menuEl.style.top  = `${top}px`;
    }

    hidePlanetMenu() { if (this._menuEl) this._menuEl.style.display = 'none'; }

    // ── Persistence ───────────────────────────────────────────────────────────
    scheduleSave() {
        if (this._saveTimeout) clearTimeout(this._saveTimeout);
        this._saveTimeout = setTimeout(() => this.savePlanets(), 1500);
    }
    savePlanets() {
        try {
            localStorage.setItem(this._saveKey, JSON.stringify(
                this.planetList.filter(p => !p.isDebris).map(p => p.getState())));
        } catch(e) { console.warn('Save failed', e); }
    }
    loadPlanets() {
        try {
            const raw = localStorage.getItem(this._saveKey);
            if (!raw) return;
            const arr = JSON.parse(raw);
            if (!Array.isArray(arr)) return;
            for (const s of arr) this.createPlanetAtPosition(s.x ?? 400, s.y ?? 300, s);
        } catch(e) { console.warn('Load failed', e); }
    }

    // ── Colour utilities ──────────────────────────────────────────────────────
    _blendColors(cA, cB, t) {
        const rA=(cA>>16)&0xff, gA=(cA>>8)&0xff, bA=cA&0xff;
        const rB=(cB>>16)&0xff, gB=(cB>>8)&0xff, bB=cB&0xff;
        return (Math.round(rA+(rB-rA)*t)<<16)|(Math.round(gA+(gB-gA)*t)<<8)|Math.round(bA+(bB-bA)*t);
    }
    _tintColor(c, f) {
        return (Math.min(255,Math.round(((c>>16)&0xff)*f))<<16) |
               (Math.min(255,Math.round(((c>>8)&0xff)*f))<<8)   |
                Math.min(255,Math.round((c&0xff)*f));
    }
}
