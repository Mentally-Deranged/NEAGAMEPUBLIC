        `;
        document.body.appendChild(hud);
        this._hudSpeedVal=document.getElementById('mg-speed-val');
        this._hudFPS=document.getElementById('mg-fps');
        this._hudBodies=document.getElementById('mg-bodies');
        this._hudDebris=document.getElementById('mg-debris-ct');
    }
    _removeHUD(){ document.getElementById('mg-hud')?.remove(); document.getElementById('mg-hud-style')?.remove(); }
    _updateHUD(nb,nd,fps){
        if(this._hudSpeedVal)this._hudSpeedVal.innerHTML=`${this.speedFactor}&times;`;
        const perfEl=document.getElementById('mg-perf');
        if(perfEl)perfEl.style.display=GameSettings.showPerfPanel?'':'none';
        if(GameSettings.showPerfPanel){
            if(this._hudBodies)this._hudBodies.textContent=`Bodies: ${nb}`;
            if(this._hudDebris)this._hudDebris.textContent=`Debris: ${nd}`;
            if(this._hudFPS){
                this._hudFPS.textContent=`FPS: ${fps}`;
                const f=parseFloat(fps);
                this._hudFPS.style.color=f>=50?'#44ff88':f>=30?'#ffaa44':'#ff4444';
            }
        }
    }

    // ── ALL BODIES combined for gravity/collision ─────────────────────────────
    get allBodies() { return this.planetList.concat(this.debrisList); }

    // ── Update loop ───────────────────────────────────────────────────────────
    update(time, delta) {
        const now=performance.now();
        const frameDt=now-this._lastFrameTime;
        this._lastFrameTime=now;
        const dt=(Math.min(delta,60)*this.speedFactor)/1000;

        const planets=this.planetList;
        const debris=this.debrisList;
        const all=this.allBodies;
        const n=all.length;

        if(n>0&&this.speedFactor>0){
            // Anti-lag: skip gravity computation on heavy frames but never more than 2 in a row
            const heavyFrame=frameDt>50&&n>80;
            this._gravSkipCounter=heavyFrame?this._gravSkipCounter+1:0;
            if(this._gravSkipCounter<=1||!heavyFrame){
                this._applyGravityInfinite(all);
            }
            for(let i=0;i<planets.length;i++) planets[i].integrate(dt);
            for(let i=0;i<debris.length;i++)  debris[i].integrate(dt);
            this._buildCollGrid(all);
            this._handleCollisions();
            this._updateTemperatures(dt);
            this._cleanupDebris();
            this._promoteDebris();
        }

        if(this.selectedPlanet) this.updateSelectionRing();
        const cam=this.cameras.main;
        const cs=this._camSpeed/cam.zoom;
        if(this._wKey.isDown)cam.scrollY-=cs; if(this._sKey.isDown)cam.scrollY+=cs;
        if(this._aKey.isDown)cam.scrollX-=cs; if(this._dKey.isDown)cam.scrollX+=cs;

        // Live menu updates (only when visible, not when field is focused)
        if(this.selectedPlanet&&this._menuEl&&this._menuEl.style.display!=='none'){
            const p=this.selectedPlanet;
            if(document.activeElement!==this._inVx)     this._inVx.value=p.vx.toFixed(2);
            if(document.activeElement!==this._inVy)     this._inVy.value=p.vy.toFixed(2);
            if(document.activeElement!==this._inRadius) this._inRadius.value=p.radius.toFixed(1);
            if(document.activeElement!==this._inMass)   this._inMass.value=p.mass.toFixed(1);
            if(document.activeElement!==this._inTemp)   this._inTemp.value=Math.round(p.temperature);
            this._updateMenuInfoDisplays(p,false);
        }
        if(this.selectedPlanet&&this._starMenuEl&&this._starMenuEl.style.display!=='none'){
            const p=this.selectedPlanet;
            if(document.activeElement!==this._inStarVx)    this._inStarVx.value=p.vx.toFixed(2);
            if(document.activeElement!==this._inStarVy)    this._inStarVy.value=p.vy.toFixed(2);
            if(document.activeElement!==this._inStarRadius)this._inStarRadius.value=p.radius.toFixed(1);
            if(document.activeElement!==this._inStarMass)  this._inStarMass.value=p.mass.toFixed(0);
            if(document.activeElement!==this._inStarTemp)  this._inStarTemp.value=Math.round(p.temperature);
            this._updateMenuInfoDisplays(p,true);
        }

        const wv=cam.worldView; const iz=1/cam.zoom;
        this.borderGfx.clear();
        this.borderGfx.lineStyle(2*iz,0x2a3a4a,1);
        this.borderGfx.strokeRect(wv.x+iz,wv.y+iz,wv.width-2*iz,wv.height-2*iz);

        this._frameCount++;
        if(time-this._lastPerfTime>=500){
            const fps=((this._frameCount/(time-this._lastPerfTime))*1000).toFixed(1);
            this._updateHUD(this.planetList.length,this.debrisList.length,fps);
            this._lastPerfTime=time; this._frameCount=0;
        }
    }

    _updateMenuInfoDisplays(p,isStar){
        const g=surfaceGravity(p);
        const suffix=isStar?'star':'planet';
        const gEl=document.getElementById(`${suffix}-grav-val`);
        const gBar=document.getElementById(`${suffix}-grav-bar`);
        const tBar=document.getElementById(`${suffix}-temp-bar`);
        if(gEl)gEl.textContent=formatGravity(g);
        if(gBar)gBar.style.width=(gravBarFraction(g)*100).toFixed(1)+'%';
        if(tBar){
            tBar.style.width=(tempBarFraction(p.temperature)*100).toFixed(1)+'%';
            tBar.style.background=tempColor(p.temperature);
        }
    }

    // ── Gravity — true infinite inverse-square, proportional to mass ──────────
    _applyGravityInfinite(bodies) {
        const G=PHY.G, eps2=PHY.SOFT*PHY.SOFT, n=bodies.length;
        for(let i=0;i<n;i++){
            const a=bodies[i];
            for(let j=i+1;j<n;j++){
                const b=bodies[j];
                const dx=b.x-a.x, dy=b.y-a.y, d2=dx*dx+dy*dy;
                const inv=G/Math.pow(d2+eps2,1.5);
                // Force magnitude ∝ G * mA * mB / r²
                // Acceleration on A = G * mB / r² (mass of B determines pull strength on A)
                a.ax+=inv*b.mass*dx; a.ay+=inv*b.mass*dy;
                b.ax-=inv*a.mass*dx; b.ay-=inv*a.mass*dy;
            }
        }
    }

    // ── Temperature system ────────────────────────────────────────────────────
    _updateTemperatures(dt) {
        const stars=this.planetList.filter(p=>p.isStar);
        const planets=this.planetList.filter(p=>!p.isStar);

        // Update star temperature (stars keep high temp)
        for(const star of stars){
            const target=PHY.STAR_BASE_TEMP+(star.mass/5000)*200;
            star.temperature+=(target-star.temperature)*Math.min(1,dt*0.5);
        }

        // Update planet temperature based on proximity to stars
        for(const planet of planets){
            let targetTemp=PHY.PLANET_SPACE_TEMP;
            for(const star of stars){
                const dx=planet.x-star.x, dy=planet.y-star.y;
                const dist=Math.sqrt(dx*dx+dy*dy)||1;
                // Heat contribution: inversely proportional to distance²
                // Stars contribute heat proportional to their temperature / dist²
                const heatAtDist=star.temperature*star.radius*star.radius/(dist*dist);
                targetTemp=Math.max(targetTemp,heatAtDist);
            }
            // Clamp to reasonable range
            targetTemp=Math.max(PHY.PLANET_SPACE_TEMP,Math.min(PHY.STAR_BASE_TEMP*1.5,targetTemp));
            // Smooth toward target
            const rate=PHY.TEMP_CHANGE_RATE;
            if(planet.temperature<targetTemp) planet.temperature=Math.min(targetTemp,planet.temperature+rate*dt);
            else                              planet.temperature=Math.max(targetTemp,planet.temperature-rate*dt*0.3);
            planet.updateTypeFromTemp();
        }

        // Debris picks up temperature too (simplified)
        for(const d of this.debrisList){
            let targetTemp=PHY.PLANET_SPACE_TEMP;
            for(const star of stars){
                const dx=d.x-star.x,dy=d.y-star.y,dist=Math.sqrt(dx*dx+dy*dy)||1;
                targetTemp=Math.max(targetTemp,star.temperature*star.radius*star.radius/(dist*dist));
            }
            d.temperature=Math.max(PHY.PLANET_SPACE_TEMP,Math.min(PHY.STAR_BASE_TEMP,targetTemp));
        }
    }

    // ── Spatial hash (collision only) ─────────────────────────────────────────
    _cellKey(gx,gy){return((gx&0xffff)|((gy&0xffff)<<16))>>>0;}
    _buildCollGrid(bodies){
        this._collGrid.clear(); const cs=PHY.GRID_CELL;
        for(const b of bodies){
            const k=this._cellKey(Math.floor(b.x/cs),Math.floor(b.y/cs));
            if(!this._collGrid.has(k))this._collGrid.set(k,[]);
            this._collGrid.get(k).push(b);
        }
    }
    _getCollNeighbors(b){
        const out=this._collScratch; out.length=0;
        const cs=PHY.GRID_CELL,gx=Math.floor(b.x/cs),gy=Math.floor(b.y/cs);
        for(let dx=-1;dx<=1;dx++)for(let dy=-1;dy<=1;dy++){
            const cell=this._collGrid.get(this._cellKey(gx+dx,gy+dy));
            if(cell)for(const nb of cell)out.push(nb);
        }
        return out;
    }

    // ── Collisions ────────────────────────────────────────────────────────────
    _handleCollisions() {
        const all=this.allBodies;
        for(const b of all) b.mergedThisFrame=false;

        const toRemovePlanets=[],toRemoveDebris=[],toAdd=[],done=new Set(),activeGrind=new Set();

        for(const a of all){
            if(a.mergedThisFrame||a.isDragged)continue;
            for(const b of this._getCollNeighbors(a)){
                if(b===a||b.mergedThisFrame||b.isDragged)continue;
                const lo=Math.min(a.planetId,b.planetId),hi=Math.max(a.planetId,b.planetId);
                const id=(lo<<16)|hi;
                if(done.has(id))continue; done.add(id);
                const dx=b.x-a.x,dy=b.y-a.y,dist=Math.sqrt(dx*dx+dy*dy)||0.001;
                const sumR=a.radius+b.radius;
                if(dist>=sumR)continue;

                // STAR vs STAR → always explode (supernova)
                if(a.isStar&&b.isStar){
                    this._triggerSupernova((a.x+b.x)*0.5,(a.y+b.y)*0.5,Math.max(a.radius,b.radius)*3);
                    a.mergedThisFrame=b.mergedThisFrame=true;
                    toRemovePlanets.push(a);toRemovePlanets.push(b);
                    continue;
                }

                // STAR eats planet or debris → always explode planet on touch
                if(a.isStar||b.isStar){
                    const[star,other]=a.isStar?[a,b]:[b,a];
                    // Planet/debris touching star → explode (absorb)
                    const mT=star.mass+other.mass*0.25;
                    star.radius=Math.sqrt(star.radius**2+(other.radius*0.18)**2);
                    star.mass=mT; star.refreshSprite();
                    other.mergedThisFrame=true;
                    if(other.isDebris)toRemoveDebris.push(other);
                    else              toRemovePlanets.push(other);
                    this._vfxMerge((a.x+b.x)*0.5,(a.y+b.y)*0.5,other.radius);
                    continue;
                }

                // DEBRIS hits heavier body → explode debris, add mass to body
                if(a.isDebris||b.isDebris){
                    const[deb,body]=a.isDebris?[a,b]:[b,a];
                    if(body.isDebris){
                        // Debris vs debris — merge smaller into larger
                        const[big,sml]=a.mass>=b.mass?[a,b]:[b,a];
                        const mT=big.mass+sml.mass;
                        big.vx=(big.vx*big.mass+sml.vx*sml.mass)/mT;
                        big.vy=(big.vy*big.mass+sml.vy*sml.mass)/mT;
                        big.mass=mT; big.radius=Math.max(big.radius,Math.sqrt(big.radius**2+sml.radius**2)*0.8);
                        big.mergedThisFrame=sml.mergedThisFrame=true;
                        toRemoveDebris.push(sml);
                    } else {
                        // Debris hits planet → explode debris, add its mass to planet
                        const mT=body.mass+deb.mass;
                        body.vx=(body.vx*body.mass+deb.vx*deb.mass)/mT;
                        body.vy=(body.vy*body.mass+deb.vy*deb.mass)/mT;
                        body.mass=mT;
                        body.radius=Math.sqrt(body.radius**2+(deb.radius*0.5)**2);
                        body.refreshSprite();
                        deb.mergedThisFrame=true; toRemoveDebris.push(deb);
                        this._vfxMerge(deb.x,deb.y,deb.radius*2);
                    }
                    continue;
                }

                // PLANET vs PLANET
                const ratio=dist/sumR;
                if(ratio<PHY.MERGE_FRAC){
                    this._rocheContacts.delete(id);
                    const mT=a.mass+b.mass;
                    const nvx=(a.vx*a.mass+b.vx*b.mass)/mT,nvy=(a.vy*a.mass+b.vy*b.mass)/mT;
                    const[big,sml]=a.mass>=b.mass?[a,b]:[b,a];
                    big.radius=Math.sqrt(big.radius**2+sml.radius**2);
                    big.mass=mT; big.vx=nvx; big.vy=nvy;
                    big.color=this._blendColors(big.color,sml.color,sml.mass/mT);
                    big.refreshSprite();
                    big.mergedThisFrame=sml.mergedThisFrame=true;
                    toRemovePlanets.push(sml);
                    this._vfxMerge((a.x+b.x)*0.5,(a.y+b.y)*0.5,big.radius);
                    if(this.selectedPlanet===sml)this.selectPlanet(big);
                    continue;
                }

                const[big,sml]=a.mass>=b.mass?[a,b]:[b,a];
                const relVx=sml.vx-big.vx,relVy=sml.vy-big.vy;
                const speed=Math.sqrt(relVx*relVx+relVy*relVy);
                if(sml.radius<=5){this._bounce(a,b,dx,dy,dist,sumR);continue;}

                activeGrind.add(id);
                const grind=(this._rocheContacts.get(id)||0)+1;
                this._rocheContacts.set(id,grind);

                if(speed>=PHY.ROCHE_FAST_THRESH||grind>=PHY.ROCHE_GRIND_FRAMES){
                    this._rocheContacts.delete(id);
                    big.mergedThisFrame=sml.mergedThisFrame=true;
                    toRemovePlanets.push(sml);
                    const mAbs=sml.mass*0.15,mEj=sml.mass*0.85,mBigNew=big.mass+mAbs;
                    big.vx=(big.vx*big.mass+sml.vx*mAbs)/mBigNew;
                    big.vy=(big.vy*big.mass+sml.vy*mAbs)/mBigNew;
                    big.mass=mBigNew; big.radius=Math.sqrt(big.radius**2+(sml.radius*0.38)**2);
                    big.refreshSprite();
                    const frags=this._spawnDebrisFrags(sml.x,sml.y,sml.vx,sml.vy,mEj,sml.radius,sml.color,dx/dist,dy/dist,speed);
                    for(const f of frags)toAdd.push(f);
                    this._vfxRoche((a.x+b.x)*0.5,(a.y+b.y)*0.5,sml.radius);
                    if(this.selectedPlanet===sml)this.selectPlanet(big);
                } else {
                    this._depenetrate(a,b,dx,dy,dist,sumR);
                }
            }
        }

        for(const[pid]of this._rocheContacts)if(!activeGrind.has(pid))this._rocheContacts.delete(pid);
        for(const dead of toRemovePlanets)this._removePlanet(dead);
        for(const dead of toRemoveDebris) this._removeDebris(dead);
        for(const opts of toAdd)          this._spawnDebris(opts);
    }

    // ── Debris promotion ──────────────────────────────────────────────────────
    _promoteDebris() {
        const toPromote=[];
        for(const d of this.debrisList){
            if(d.radius>=PHY.DEBRIS_PROMOTE_RADIUS&&d.mass>=PHY.DEBRIS_PROMOTE_MASS) toPromote.push(d);
        }
        for(const d of toPromote){
            if(this.planetList.length>=PHY.MAX_BODIES)break;
            const idx=this.debrisList.indexOf(d);
            if(idx===-1)continue;
            this.debrisList.splice(idx,1);
            const newP=new Planet(this,d.x,d.y,{
                radius:d.radius,mass:d.mass,vx:d.vx,vy:d.vy,
                color:d.color,isDebris:false,isStar:false,
                texSeed:(Math.random()*0x7fffffff)|0,
                temperature:d.temperature,
            });
            this.planetList.push(newP);
            this._vfxBirth(d.x,d.y,d.radius);
            d.destroy();
        }
    }

    // ── Physics primitives ────────────────────────────────────────────────────
    _depenetrate(a,b,dx,dy,dist,sumR){
        const nx=dx/dist,ny=dy/dist,mT=a.mass+b.mass,ov=sumR-dist;
        a.x-=nx*ov*(b.mass/mT);a.y-=ny*ov*(b.mass/mT);
        b.x+=nx*ov*(a.mass/mT);b.y+=ny*ov*(a.mass/mT);
        a._sync();b._sync();
    }
    _bounce(a,b,dx,dy,dist,sumR){
        const nx=dx/dist,ny=dy/dist,mT=a.mass+b.mass,ov=sumR-dist;
        a.x-=nx*ov*(b.mass/mT);a.y-=ny*ov*(b.mass/mT);
        b.x+=nx*ov*(a.mass/mT);b.y+=ny*ov*(a.mass/mT);
        a._sync();b._sync();
        const rvx=b.vx-a.vx,rvy=b.vy-a.vy,vN=rvx*nx+rvy*ny;
        if(vN>=0)return;
        const invM=1/a.mass+1/b.mass,j=-(1+PHY.BOUNCE_E)*vN/invM;
        a.vx-=(j/a.mass)*nx;a.vy-=(j/a.mass)*ny;
        b.vx+=(j/b.mass)*nx;b.vy+=(j/b.mass)*ny;
        const vNP=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny;
        if(vNP<PHY.MIN_SEP_SPEED){
            const jC=(PHY.MIN_SEP_SPEED-vNP)/invM;
            a.vx-=(jC/a.mass)*nx;a.vy-=(jC/a.mass)*ny;
            b.vx+=(jC/b.mass)*nx;b.vy+=(jC/b.mass)*ny;
        }
    }

    // ── Debris spawning ───────────────────────────────────────────────────────
    _spawnDebrisFrags(x,y,pvx,pvy,totalMass,parentR,color,nx,ny,relSpeed){
        const cap=PHY.MAX_DEBRIS-this.debrisList.length;
        const fragCap=Math.max(3,Math.ceil(parentR*1.2));
        const maxF=Math.min(PHY.MAX_FRAGS,cap,fragCap);
        if(maxF<1)return[];
        const tx=-ny,ty=nx,ejBase=relSpeed*0.12+6;
        let mLeft=totalMass;
        const rawFrags=[];
        for(let i=0;i<maxF;i++){
            const last=i===maxF-1;
            let fMass=last?mLeft:Math.max(PHY.DEBRIS_MASS_MIN,Math.min(mLeft*0.25,mLeft-PHY.DEBRIS_MASS_MIN*(maxF-i-1)));
            fMass=Math.min(fMass,mLeft);mLeft-=fMass;if(mLeft<0)mLeft=0;
            const areaFrac=fMass/totalMass,fRad=Math.max(1.2,parentR*Math.sqrt(areaFrac));
            const ts=(Math.random()-0.5)*2,rs=(Math.random()-0.5)*0.8;
            rawFrags.push({x:x+(Math.random()-0.5)*parentR*0.7,y:y+(Math.random()-0.5)*parentR*0.7,
                vx:pvx+tx*ejBase*ts+nx*ejBase*rs+(Math.random()-0.5)*4,
                vy:pvy+ty*ejBase*ts+ny*ejBase*rs+(Math.random()-0.5)*4,
                mass:fMass,radius:fRad,color:this._tintColor(color,0.85+Math.random()*0.3),isDebris:true});
            if(mLeft<=0)break;
        }
        return rawFrags;
    }
    _spawnDebris(opts){
        if(this.debrisList.length>=PHY.MAX_DEBRIS)return null;
        const p=new Planet(this,opts.x,opts.y,opts);
        this.debrisList.push(p);
        return p;
    }

    // ── SUPERNOVA ─────────────────────────────────────────────────────────────
    _triggerSupernova(cx,cy,blastRadius){
        if(this._supernovaActive)return;
        this._supernovaActive=true;
        this.cameras.main.shake(800,0.03);
        this.cameras.main.flash(400,255,160,0);
        const toDestroy=[...this.planetList.filter(p=>!p.isStar&&!p.mergedThisFrame)];
        for(const p of toDestroy)p.mergedThisFrame=true;
        const g=this.add.graphics().setDepth(50);
        let t=0;const dur=1800;
        const ev=this.time.addEvent({delay:16,repeat:Math.ceil(dur/16),callback:()=>{
            t+=16;const p=t/dur;g.clear();
            if(p<0.15){g.fillStyle(0xffffff,(1-p/0.15)*0.9);g.fillCircle(cx,cy,blastRadius*(0.3+p/0.15*2));}
            const r1=blastRadius*(0.5+p*6);g.lineStyle(8*(1-p),0xff8800,Math.max(0,(1-p)*0.7));g.strokeCircle(cx,cy,r1);
            if(p>0.1){const r2=blastRadius*(0.5+(p-0.1)*5.5);g.lineStyle(4*(1-(p-0.1)/0.9),0xffdd44,Math.max(0,(1-(p-0.1)/0.9)*0.5));g.strokeCircle(cx,cy,r2);}
            g.fillStyle(0xff4400,Math.max(0,(1-p)*0.12));g.fillCircle(cx,cy,blastRadius*(1+p*4));
            if(p>=1){g.destroy();ev.remove();this._supernovaActive=false;}
        }});
        this.time.delayedCall(300,()=>{
            for(const p of toDestroy){const i=this.planetList.indexOf(p);if(i!==-1){this.planetList.splice(i,1);p.destroy();}}
            const sToRm=this.planetList.filter(p=>p.mergedThisFrame&&p.isStar);
            for(const s of sToRm){const i=this.planetList.indexOf(s);if(i!==-1){this.planetList.splice(i,1);s.destroy();}}
            this.deselectPlanet();this.scheduleSave();
        });
    }

    // ── Body management ───────────────────────────────────────────────────────
    _spawnPlanet(opts){
        if(this.planetList.length>=PHY.MAX_BODIES)return null;
        const p=new Planet(this,opts.x,opts.y,opts);
        this.planetList.push(p);return p;
    }
    createPlanetAtPosition(x,y,opts={}){return this._spawnPlanet({x,y,...opts});}

    _removePlanet(p){
        const i=this.planetList.indexOf(p);if(i!==-1)this.planetList.splice(i,1);
        p.destroy();if(this.selectedPlanet===p)this.deselectPlanet();
    }
    _removeDebris(d){
        const i=this.debrisList.indexOf(d);if(i!==-1)this.debrisList.splice(i,1);
        d.destroy();
    }

    addPlanet(){
        const cam=this.cameras.main,wv=cam.worldView,pad=80/cam.zoom;
        this.createPlanetAtPosition(
            Phaser.Math.FloatBetween(wv.x+pad,wv.x+wv.width-pad),
            Phaser.Math.FloatBetween(wv.y+pad,wv.y+wv.height-pad));
        this.scheduleSave();
    }
    addStar(){
        const cam=this.cameras.main,wv=cam.worldView,pad=120/cam.zoom;
        const radius=Phaser.Math.FloatBetween(PHY.STAR_MIN_RADIUS,PHY.STAR_MAX_RADIUS);
        this.createPlanetAtPosition(
            Phaser.Math.FloatBetween(wv.x+pad,wv.x+wv.width-pad),
            Phaser.Math.FloatBetween(wv.y+pad,wv.y+wv.height-pad),
            {radius,mass:radius*radius*1.5,isStar:true});
        this.scheduleSave();
    }
    addMoon(parent){
        if(!parent)return null;
        const moonR=Math.max(4,parent.radius*Phaser.Math.FloatBetween(0.25,0.45));
        const moonM=Math.max(4,moonR*moonR*0.13);
        const od=(parent.radius+moonR)*2.5+10;
        const ang=Phaser.Math.FloatBetween(0,Math.PI*2);
        const os=Math.sqrt(PHY.G*parent.mass/od);
        const moon=this.createPlanetAtPosition(parent.x+Math.cos(ang)*od,parent.y+Math.sin(ang)*od,{
            radius:moonR,mass:moonM,
            vx:parent.vx+(-Math.sin(ang))*os,vy:parent.vy+(Math.cos(ang))*os,
            color:this._tintColor(parent.color,Phaser.Math.FloatBetween(0.55,0.80)),
        });
        this.scheduleSave();return moon;
    }
    addOrbitingPlanet(star){
        if(!star)return null;
        const pR=Phaser.Math.FloatBetween(8,28),pM=pR*pR*0.13;
        const od=Phaser.Math.FloatBetween(star.radius*2.5+30,star.radius*6+200);
        const ang=Phaser.Math.FloatBetween(0,Math.PI*2);
        const os=Math.sqrt(PHY.G*star.mass/od);
        const pl=this.createPlanetAtPosition(star.x+Math.cos(ang)*od,star.y+Math.sin(ang)*od,{
            radius:pR,mass:pM,
            vx:star.vx+(-Math.sin(ang))*os,vy:star.vy+(Math.cos(ang))*os,
            color:Phaser.Utils.Array.GetRandom(this.planetColours),
        });
        this.scheduleSave();return pl;
    }
    addSolarSystem(star){
        if(!star)return;
        const n=Phaser.Math.Between(6,9),minD=star.radius*2.8,maxD=star.radius*7+500;
        const spacing=(maxD-minD)/n;
        for(let i=0;i<n;i++){
            const od=minD+spacing*i+Phaser.Math.FloatBetween(0,spacing*0.5);
            const ang=Phaser.Math.FloatBetween(0,Math.PI*2);
            const os=Math.sqrt(PHY.G*star.mass/od);
            const sc=0.4+(i/n)*0.6;
            const pR=Math.max(6,Phaser.Math.FloatBetween(6,22)*sc+(i>n*0.55?12:0));
            this.createPlanetAtPosition(star.x+Math.cos(ang)*od,star.y+Math.sin(ang)*od,{
                radius:pR,mass:pR*pR*0.13,
                vx:star.vx+(-Math.sin(ang))*os,vy:star.vy+(Math.cos(ang))*os,
                color:Phaser.Utils.Array.GetRandom(this.planetColours),
            });
            if(i>=n*0.55&&Math.random()<0.5){const lp=this.planetList[this.planetList.length-1];if(lp)this.addMoon(lp);}
        }
        // Note: does NOT close the menu — per spec
        this.scheduleSave();
    }
    addBinaryPartner(primaryStar){
        if(!primaryStar)return null;
        const sf=Phaser.Math.FloatBetween(0.6,1.0);
        const cR=Phaser.Math.Clamp(primaryStar.radius*sf,PHY.STAR_MIN_RADIUS*0.5,PHY.STAR_MAX_RADIUS);
        const cM=cR*cR*1.5;
        const sep=(primaryStar.radius+cR)*Phaser.Math.FloatBetween(3.0,5.0);
        const ang=Phaser.Math.FloatBetween(0,Math.PI*2);
        const tM=primaryStar.mass+cM;
        const rP=sep*(cM/tM),rC=sep*(primaryStar.mass/tM);
        const pnX=primaryStar.x-Math.cos(ang)*rP,pnY=primaryStar.y-Math.sin(ang)*rP;
        const cX=primaryStar.x+Math.cos(ang)*rC,cY=primaryStar.y+Math.sin(ang)*rC;
        const vP=Math.sqrt(PHY.G*cM*cM/(tM*sep)),vC=Math.sqrt(PHY.G*primaryStar.mass*primaryStar.mass/(tM*sep));
        const perpX=-Math.sin(ang),perpY=Math.cos(ang);
        primaryStar.x=pnX;primaryStar.y=pnY;
        primaryStar.vx+=-perpX*vP;primaryStar.vy+=-perpY*vP;primaryStar._sync();
        const companion=this.createPlanetAtPosition(cX,cY,{
            radius:cR,mass:cM,isStar:true,
            vx:primaryStar.vx-(-perpX*vP)+perpX*vC,
            vy:primaryStar.vy-(-perpY*vP)+perpY*vC,
            texSeed:(Math.random()*0x7fffffff)|0,
        });
        this._vfxBirth(pnX,pnY,primaryStar.radius*0.5);
        this._vfxBirth(cX,cY,cR*0.5);
        this.scheduleSave();return companion;
    }

    clearAllPlanets(){
        for(const p of this.planetList)p.destroy();
        for(const d of this.debrisList)d.destroy();
        this.planetList=[];this.debrisList=[];
        this._rocheContacts.clear();this.debrisPool.releaseAll();
        this.deselectPlanet();this.scheduleSave();
    }
    clearAllDebris(){
        for(const d of this.debrisList)d.destroy();
        this.debrisList=[];this.debrisPool.releaseAll();
    }
    removeOffscreen(){
        const cam=this.cameras.main,wv=cam.worldView;
        const margin=200;
        const inView=p=>(p.x>wv.x-margin&&p.x<wv.x+wv.width+margin&&p.y>wv.y-margin&&p.y<wv.y+wv.height+margin);
        for(let i=this.planetList.length-1;i>=0;i--){
            const p=this.planetList[i];if(!inView(p)){this.planetList.splice(i,1);p.destroy();if(this.selectedPlanet===p)this.deselectPlanet();}
        }
        for(let i=this.debrisList.length-1;i>=0;i--){
            const d=this.debrisList[i];if(!inView(d)){this.debrisList.splice(i,1);d.destroy();}
        }
    }

    _cleanupDebris(){
        let removed=0;
        for(let i=this.debrisList.length-1;i>=0&&removed<30;i--){
            const p=this.debrisList[i];
            if(p.lifetime<=0||p.mass<PHY.DEBRIS_MASS_MIN){
                this.debrisList.splice(i,1);p.destroy();removed++;
            }
        }
        // If over cap, prune oldest (lowest lifetime)
        if(this.debrisList.length>PHY.MAX_DEBRIS){
            this.debrisList.sort((a,b)=>a.lifetime-b.lifetime);
            while(this.debrisList.length>PHY.MAX_DEBRIS){
                const d=this.debrisList.shift();d.destroy();
            }
        }
    }

    // ── Selection ─────────────────────────────────────────────────────────────
    selectPlanet(planet){
        if(this.selectedPlanet===planet)return;
        this.deselectPlanet();
        this.selectedPlanet=planet;this.updateSelectionRing();
    }
    deselectPlanet(){
        if(!this.selectedPlanet)return;
        this.selectionRing.clear();this.hidePlanetMenu();this.hideStarMenu();
        this.selectedPlanet=null;
    }
    updateSelectionRing(){
        if(!this.selectedPlanet)return;
        const p=this.selectedPlanet,r=p.radius+11;
        const col=p.isStar?0xffcc44:0x7ef7ff;
        this.selectionRing.clear();
        this.selectionRing.lineStyle(2,col,0.85);
        this.selectionRing.strokeCircle(p.x,p.y,r);
        this.selectionRing.lineStyle(1,col,0.45);
        for(let a=0;a<Math.PI*2;a+=Math.PI/6)
            this.selectionRing.lineBetween(p.x+Math.cos(a)*(r+2),p.y+Math.sin(a)*(r+2),p.x+Math.cos(a)*(r+8),p.y+Math.sin(a)*(r+8));
    }

    // ── VFX ───────────────────────────────────────────────────────────────────
    _vfxMerge(x,y,r){
        if(!GameSettings.explosions){if(GameSettings.screenShake)this.cameras.main.shake(60,0.001);return;}
        const g=this.add.graphics().setDepth(20);let t=0;
        const ev=this.time.addEvent({delay:16,repeat:19,callback:()=>{
            t+=16;const p=t/300;g.clear();g.fillStyle(0xffffff,(1-p)*0.75);g.fillCircle(x,y,r*(0.5+p*0.7));
            if(p>=1){g.destroy();ev.remove();}
        }});
        if(GameSettings.screenShake)this.cameras.main.shake(80,0.003);
    }
    _vfxRoche(x,y,r){
        if(!GameSettings.explosions){if(GameSettings.screenShake)this.cameras.main.shake(40,0.001);return;}
        const g=this.add.graphics().setDepth(20);let t=0;
        const ev=this.time.addEvent({delay:16,repeat:31,callback:()=>{
            t+=16;const p=t/500;g.clear();
            g.fillStyle(0xff7700,(1-p)*0.5);g.fillCircle(x,y,r*(1+p*2.2));
            g.lineStyle(3*(1-p),0xffbb00,(1-p)*0.9);g.strokeCircle(x,y,r*(1.3+p*2.8));
            if(p>=1){g.destroy();ev.remove();}
        }});
        if(GameSettings.screenShake)this.cameras.main.shake(60,0.0025);
    }
    _vfxBirth(x,y,r){
        const g=this.add.graphics().setDepth(20);let t=0;
        const ev=this.time.addEvent({delay:16,repeat:37,callback:()=>{
            t+=16;const p=t/600;g.clear();
            g.lineStyle(2*(1-p),0x44ffcc,(1-p)*0.9);g.strokeCircle(x,y,r*(1+p*2.5));
            g.fillStyle(0x88ffdd,(1-p)*0.3);g.fillCircle(x,y,r*(0.8+p));
            if(p>=1){g.destroy();ev.remove();}
        }});
    }

    // ── Speed ─────────────────────────────────────────────────────────────────
    _changeSpeed(dir){
        this.currentSpeedIndex=Phaser.Math.Clamp(this.currentSpeedIndex+dir,0,this.speedFactors.length-1);
        this.speedFactor=this.speedFactors[this.currentSpeedIndex];
        if(this._hudSpeedVal)this._hudSpeedVal.innerHTML=`${this.speedFactor}&times;`;
    }
    _setSpeedZero(){this.currentSpeedIndex=0;this.speedFactor=0;if(this._hudSpeedVal)this._hudSpeedVal.innerHTML=`0&times;`;}

    // ── DOM Menus ─────────────────────────────────────────────────────────────
    _initDomMenu(){
        this._menuEl    =document.getElementById('planet-menu');
        this._starMenuEl=document.getElementById('star-menu');

        // ─ Planet menu fields
        this._inRadius=document.getElementById('planet-radius');
        this._inVx    =document.getElementById('planet-vx');
        this._inVy    =document.getElementById('planet-vy');
        this._inMass  =document.getElementById('planet-mass');
        this._inTemp  =document.getElementById('planet-temp');

        document.getElementById('planet-apply')?.addEventListener('click',()=>{
            if(!this.selectedPlanet)return this.hidePlanetMenu();
            const p=this.selectedPlanet;
            // Apply vx/vy from fields
            p.vx=parseFloat(this._inVx.value)||0;
            p.vy=parseFloat(this._inVy.value)||0;
            const nr=parseFloat(this._inRadius.value);
            const nm=parseFloat(this._inMass.value);
            if(nr>0&&Math.abs(nr-p.radius)>0.1){p.radius=Math.max(4,Math.min(300,nr));p.mass=p.radius*p.radius*0.13;p.refreshSprite();}
            else if(nm>0&&Math.abs(nm-p.mass)>0.1){p.mass=nm;p.radius=Math.sqrt(nm/0.13);p.refreshSprite();}
            const nt=parseFloat(this._inTemp.value);
            if(!isNaN(nt))p.temperature=Math.max(0,Math.min(20000,nt));
            this.hidePlanetMenu();this.scheduleSave();
        });
        // Live vx/vy editing
        this._inVx.addEventListener('change',()=>{if(this.selectedPlanet)this.selectedPlanet.vx=parseFloat(this._inVx.value)||0;});
        this._inVy.addEventListener('change',()=>{if(this.selectedPlanet)this.selectedPlanet.vy=parseFloat(this._inVy.value)||0;});
        // Live temp editing
        this._inTemp.addEventListener('input',()=>{
            if(!this.selectedPlanet)return;
            const t=parseFloat(this._inTemp.value);
            if(!isNaN(t)){this.selectedPlanet.temperature=Math.max(0,Math.min(20000,t));this.selectedPlanet.updateTypeFromTemp();}
            this._updateMenuInfoDisplays(this.selectedPlanet,false);
        });

        document.getElementById('planet-add-moon')?.addEventListener('click',()=>{
            if(!this.selectedPlanet)return this.hidePlanetMenu();
            this.addMoon(this.selectedPlanet);this.hidePlanetMenu();
        });
        document.getElementById('planet-delete')?.addEventListener('click',()=>{
            if(!this.selectedPlanet)return this.hidePlanetMenu();
            const dead=this.selectedPlanet;this.deselectPlanet();this._removePlanet(dead);
            this.hidePlanetMenu();this.scheduleSave();
        });
        document.getElementById('planet-delete-all')?.addEventListener('click',()=>{this.clearAllPlanets();this.hidePlanetMenu();});

        // ─ Star menu fields
        this._inStarRadius=document.getElementById('star-radius');
        this._inStarVx    =document.getElementById('star-vx');
        this._inStarVy    =document.getElementById('star-vy');
        this._inStarMass  =document.getElementById('star-mass');
        this._inStarTemp  =document.getElementById('star-temp');

        document.getElementById('star-apply')?.addEventListener('click',()=>{
            if(!this.selectedPlanet)return this.hideStarMenu();
            const p=this.selectedPlanet;
            p.vx=parseFloat(this._inStarVx.value)||0;
            p.vy=parseFloat(this._inStarVy.value)||0;
            const nr=parseFloat(this._inStarRadius.value);
            const nm=parseFloat(this._inStarMass.value);
            if(nr>0&&Math.abs(nr-p.radius)>0.1){p.radius=Math.max(PHY.STAR_MIN_RADIUS*0.3,Math.min(PHY.STAR_MAX_RADIUS*2,nr));p.mass=p.radius*p.radius*1.5;p.refreshSprite();}
            else if(nm>0&&Math.abs(nm-p.mass)>1){p.mass=nm;p.radius=Math.sqrt(nm/1.5);p.refreshSprite();}
            const nt=parseFloat(this._inStarTemp.value);
            if(!isNaN(nt))p.temperature=Math.max(0,Math.min(50000,nt));
            this.hideStarMenu();this.scheduleSave();
        });
        this._inStarVx.addEventListener('change',()=>{if(this.selectedPlanet)this.selectedPlanet.vx=parseFloat(this._inStarVx.value)||0;});
        this._inStarVy.addEventListener('change',()=>{if(this.selectedPlanet)this.selectedPlanet.vy=parseFloat(this._inStarVy.value)||0;});
        this._inStarTemp.addEventListener('input',()=>{
            if(!this.selectedPlanet)return;
            const t=parseFloat(this._inStarTemp.value);
            if(!isNaN(t))this.selectedPlanet.temperature=Math.max(0,Math.min(50000,t));
            this._updateMenuInfoDisplays(this.selectedPlanet,true);
        });

        document.getElementById('star-add-planet')?.addEventListener('click',()=>{
            if(!this.selectedPlanet)return this.hideStarMenu();
            this.addOrbitingPlanet(this.selectedPlanet);this.hideStarMenu();
        });
        document.getElementById('star-add-system')?.addEventListener('click',()=>{
            // Does NOT close the menu
            if(!this.selectedPlanet)return;
            this.addSolarSystem(this.selectedPlanet);
        });
        document.getElementById('star-add-binary')?.addEventListener('click',()=>{
            if(!this.selectedPlanet)return this.hideStarMenu();
            this.addBinaryPartner(this.selectedPlanet);this.hideStarMenu();
        });
        document.getElementById('star-delete')?.addEventListener('click',()=>{
            if(!this.selectedPlanet)return this.hideStarMenu();
            const dead=this.selectedPlanet;this.deselectPlanet();this._removePlanet(dead);
            this.hideStarMenu();this.scheduleSave();
        });
        document.getElementById('star-delete-all')?.addEventListener('click',()=>{this.clearAllPlanets();this.hideStarMenu();});

        this._domKeyListener=e=>{if(e.key==='Escape'){this.hidePlanetMenu();this.hideStarMenu();}};
        document.addEventListener('keydown',this._domKeyListener);
        this._domOutsideClick=e=>{
            if(this._menuEl&&!this._menuEl.contains(e.target))this.hidePlanetMenu();
            if(this._starMenuEl&&!this._starMenuEl.contains(e.target))this.hideStarMenu();
        };
        document.addEventListener('pointerdown',this._domOutsideClick);
    }

    showPlanetMenu(cx,cy){
        if(!this._menuEl||!this.selectedPlanet)return;
        this.hideStarMenu();
        const p=this.selectedPlanet;
        this._inRadius.value=p.radius.toFixed(1);
        this._inVx.value=p.vx.toFixed(2);
        this._inVy.value=p.vy.toFixed(2);
        this._inMass.value=p.mass.toFixed(1);
        this._inTemp.value=Math.round(p.temperature);
        this._updateMenuInfoDisplays(p,false);
        let left=cx+8,top=cy+8;
        this._menuEl.style.display='flex';
        const rb=this._menuEl.getBoundingClientRect();
        if(left+rb.width+10>window.innerWidth) left=window.innerWidth-rb.width-10;
        if(top+rb.height+10>window.innerHeight)top=window.innerHeight-rb.height-10;
        this._menuEl.style.left=`${Math.max(0,left)}px`;
        this._menuEl.style.top=`${Math.max(0,top)}px`;
    }
    hidePlanetMenu(){if(this._menuEl)this._menuEl.style.display='none';}

    showStarMenu(cx,cy){
        if(!this._starMenuEl||!this.selectedPlanet)return;
        this.hidePlanetMenu();
        const p=this.selectedPlanet;
        this._inStarRadius.value=p.radius.toFixed(1);
        this._inStarVx.value=p.vx.toFixed(2);
        this._inStarVy.value=p.vy.toFixed(2);
        this._inStarMass.value=p.mass.toFixed(0);
        this._inStarTemp.value=Math.round(p.temperature);
        this._updateMenuInfoDisplays(p,true);
        let left=cx+8,top=cy+8;
        this._starMenuEl.style.display='flex';
        const rb=this._starMenuEl.getBoundingClientRect();
        if(left+rb.width+10>window.innerWidth) left=window.innerWidth-rb.width-10;
        if(top+rb.height+10>window.innerHeight)top=window.innerHeight-rb.height-10;
        this._starMenuEl.style.left=`${Math.max(0,left)}px`;
        this._starMenuEl.style.top=`${Math.max(0,top)}px`;
    }
    hideStarMenu(){if(this._starMenuEl)this._starMenuEl.style.display='none';}

    // ── Persistence ───────────────────────────────────────────────────────────
    scheduleSave(){if(this._saveTimeout)clearTimeout(this._saveTimeout);this._saveTimeout=setTimeout(()=>this.savePlanets(),1500);}
    savePlanets(){
        try{localStorage.setItem(this._saveKey,JSON.stringify(
            this.planetList.filter(p=>!p.isDebris).map(p=>p.getState())));}catch(e){console.warn('Save failed',e);}
    }
    loadPlanets(){
        try{const raw=localStorage.getItem(this._saveKey);if(!raw)return;
            const arr=JSON.parse(raw);if(!Array.isArray(arr))return;
            for(const s of arr)this.createPlanetAtPosition(s.x??400,s.y??300,s);}catch(e){console.warn('Load failed',e);}
    }

    // ── Color utils ───────────────────────────────────────────────────────────
    _blendColors(cA,cB,t){
        const rA=(cA>>16)&0xff,gA=(cA>>8)&0xff,bA=cA&0xff;
        const rB=(cB>>16)&0xff,gB=(cB>>8)&0xff,bB=cB&0xff;
        return(Math.round(rA+(rB-rA)*t)<<16)|(Math.round(gA+(gB-gA)*t)<<8)|Math.round(bA+(bB-bA)*t);
    }
    _tintColor(c,f){
        return(Math.min(255,Math.round(((c>>16)&0xff)*f))<<16)|
               (Math.min(255,Math.round(((c>>8)&0xff)*f))<<8)|
                Math.min(255,Math.round((c&0xff)*f));
    }
}

// =============================================================================
//  PHASER CONFIG
// =============================================================================
const config = {
    type:Phaser.AUTO,
    width:window.innerWidth, height:window.innerHeight,
    backgroundColor:'#000812',
    scene:[OpeningScreen,MainGame,Options,LoadGame],
    scale:{mode:Phaser.Scale.RESIZE,autoCenter:Phaser.Scale.CENTER_BOTH},
    input:{activePointers:3},
};
const game=new Phaser.Game(config);
window.addEventListener('resize',()=>game.scale.resize(window.innerWidth,window.innerHeight));
</script>
