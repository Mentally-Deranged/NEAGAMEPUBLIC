<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Sim</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
  canvas { display: block; }

  /* ── CRT colour tokens ─────────────────────────────────────────────── */
  :root {
    --crt-bg:       #000812;
    --crt-panel:    #001a2a;
    --crt-border:   #00ffe7;
    --crt-teal:     #00ffe7;
    --crt-teal-dim: #4ecdc4;
    --crt-white:    #e8f4f0;
    --crt-danger:   #ff4444;
    --crt-glow:     0 0 8px #00ffe799, 0 0 18px #00ffe733;
    --crt-font:     "Courier New", Courier, monospace;
  }

  /* ── Panel shell ───────────────────────────────────────────────────── */
  #planet-menu {
    display:          none;
    flex-direction:   column;
    gap:              0;
    position:         fixed;
    z-index:          9999;
    width:            224px;

    background:       var(--crt-bg);
    border:           1px solid var(--crt-border);
    box-shadow:       var(--crt-glow), inset 0 0 40px #00ffe708;

    font-family:      var(--crt-font);
    font-size:        12px;
    color:            var(--crt-white);

    background-image: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.18) 3px,
      rgba(0,0,0,0.18) 4px
    );

    clip-path: polygon(
      0 10px, 10px 0,
      calc(100% - 10px) 0, 100% 10px,
      100% calc(100% - 10px), calc(100% - 10px) 100%,
      10px 100%, 0 calc(100% - 10px)
    );

    animation: crt-flicker 8s infinite;
  }

  @keyframes crt-flicker {
    0%,94%,96%,100% { opacity: 1; }
    95%             { opacity: 0.88; }
  }

  /* ── Header bar ────────────────────────────────────────────────────── */
  #planet-menu-header {
    display:         flex;
    align-items:     center;
    justify-content: space-between;
    padding:         7px 10px 6px;
    border-bottom:   1px solid #00ffe733;
    background:      #00ffe709;
  }

  #planet-menu-title {
    font-size:      10px;
    letter-spacing: 5px;
    color:          var(--crt-teal);
    text-shadow:    0 0 10px #00ffe7aa;
    text-transform: uppercase;
  }

  #planet-menu-title::after {
    content:   "_";
    animation: crt-blink 1.1s step-end infinite;
  }
  @keyframes crt-blink { 0%,100%{opacity:1} 50%{opacity:0} }

  #planet-menu-header::before,
  #planet-menu-header::after {
    content:  "◆";
    font-size: 6px;
    color:    var(--crt-teal);
    opacity:  0.5;
  }

  /* ── Body padding ──────────────────────────────────────────────────── */
  #planet-menu-body {
    padding:        10px 10px 8px;
    display:        flex;
    flex-direction: column;
    gap:            6px;
  }

  /* ── Field rows ────────────────────────────────────────────────────── */
  .pm-row {
    display:     flex;
    align-items: center;
    gap:         6px;
  }

  .pm-label {
    width:          54px;
    flex-shrink:    0;
    font-size:      9px;
    letter-spacing: 3px;
    color:          var(--crt-teal-dim);
    text-transform: uppercase;
  }

  .pm-input {
    flex:        1;
    background:  #00ffe70a;
    border:      1px solid #00ffe733;
    color:       var(--crt-white);
    font-family: var(--crt-font);
    font-size:   12px;
    padding:     3px 6px;
    outline:     none;
    transition:  border-color 0.15s, box-shadow 0.15s;

    clip-path: polygon(
      0 4px, 4px 0, calc(100% - 4px) 0, 100% 4px,
      100% calc(100% - 4px), calc(100% - 4px) 100%,
      4px 100%, 0 calc(100% - 4px)
    );
  }
  .pm-input:focus {
    border-color: var(--crt-teal);
    box-shadow:   0 0 6px #00ffe766;
    background:   #00ffe714;
  }
  .pm-input::-webkit-inner-spin-button,
  .pm-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .pm-input[type=number] { -moz-appearance: textfield; }

  /* ── Divider ───────────────────────────────────────────────────────── */
  .pm-divider {
    height:     1px;
    background: linear-gradient(to right, transparent, #00ffe744, transparent);
    margin:     4px 0 2px;
  }

  /* ── Buttons ───────────────────────────────────────────────────────── */
  .pm-btn-row {
    display: flex;
    gap:     6px;
  }

  .pm-btn {
    flex:           1;
    padding:        5px 4px;
    font-family:    var(--crt-font);
    font-size:      9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor:         pointer;
    border:         1px solid currentColor;
    background:     transparent;
    transition:     background 0.12s, box-shadow 0.12s, color 0.12s;

    clip-path: polygon(
      0 4px, 4px 0, calc(100% - 4px) 0, 100% 4px,
      100% calc(100% - 4px), calc(100% - 4px) 100%,
      4px 100%, 0 calc(100% - 4px)
    );
  }

  .pm-btn-primary { color: var(--crt-teal); }
  .pm-btn-primary:hover {
    background:  #00ffe718;
    box-shadow:  0 0 8px #00ffe766;
    color:       #fff;
  }
  .pm-btn-primary:active { background: #00ffe730; }

  .pm-btn-secondary { color: var(--crt-teal-dim); }
  .pm-btn-secondary:hover { background: #4ecdc418; color: #fff; }

  .pm-btn-danger { color: var(--crt-danger); border-color: var(--crt-danger); }
  .pm-btn-danger:hover {
    background: #ff444418;
    box-shadow: 0 0 8px #ff444466;
    color:      #ffaaaa;
  }

  .pm-btn-full { width: 100%; flex: none; }

  /* ── Footer ────────────────────────────────────────────────────────── */
  #planet-menu-footer {
    padding:        4px 10px 6px;
    border-top:     1px solid #00ffe722;
    font-size:      8px;
    letter-spacing: 3px;
    color:          #00ffe755;
    text-align:     center;
  }
</style>
</head>
<body>

<!-- ── Planet editor menu (DOM overlay) ─────────────────────────────── -->
<div id="planet-menu">
  <div id="planet-menu-header">
    <span id="planet-menu-title">BODY EDIT</span>
  </div>
  <div id="planet-menu-body">
    <div class="pm-row">
      <span class="pm-label">Vx</span>
      <input id="planet-vx"   class="pm-input" type="number" step="0.1" value="0.00">
    </div>
    <div class="pm-row">
      <span class="pm-label">Vy</span>
      <input id="planet-vy"   class="pm-input" type="number" step="0.1" value="0.00">
    </div>
    <div class="pm-row">
      <span class="pm-label">Mass</span>
      <input id="planet-mass" class="pm-input" type="number" step="1"   value="0.00">
    </div>
    <div class="pm-divider"></div>
    <div class="pm-btn-row">
      <button id="planet-apply"    class="pm-btn pm-btn-primary">▶ Apply</button>
      <button id="planet-add-moon" class="pm-btn pm-btn-secondary">◎ Moon</button>
    </div>
    <div class="pm-divider"></div>
    <div class="pm-btn-row">
      <button id="planet-delete"     class="pm-btn pm-btn-danger">✕ Delete</button>
      <button id="planet-delete-all" class="pm-btn pm-btn-danger"
              style="color:#ff8844;border-color:#ff8844">⊘ All</button>
    </div>
  </div>
  <div id="planet-menu-footer">SYSTEM·SIM // v0.1.0</div>
</div>

<script>
// =============================================================================
//  GAME SETTINGS
// =============================================================================
const GameSettings = {
    screenShake:   true,
    explosions:    true,
    showPerfPanel: true,
    save() {
        try { localStorage.setItem('game-settings', JSON.stringify({
            screenShake:   this.screenShake,
            explosions:    this.explosions,
            showPerfPanel: this.showPerfPanel,
        })); } catch(e) {}
    },
    load() {
        try {
            const raw = localStorage.getItem('game-settings');
            if (!raw) return;
            const d = JSON.parse(raw);
            if (typeof d.screenShake   === 'boolean') this.screenShake   = d.screenShake;
            if (typeof d.explosions    === 'boolean') this.explosions    = d.explosions;
            if (typeof d.showPerfPanel === 'boolean') this.showPerfPanel = d.showPerfPanel;
        } catch(e) {}
    },
};
GameSettings.load();

// =============================================================================
//  CONSTANTS
// =============================================================================
const PHY = {
    G:              600,
    SOFT:           20,
    MAX_GRAV_D:     3000,
    GRAV_CELL:      1600,
    GRID_CELL:      260,
    MERGE_FRAC:     0.30,
    BOUNCE_E:       0.35,
    // PERF: reduced from 45000 — debris fades out much faster, cutting ongoing sim cost
    DEBRIS_LIFE_MS: 12000,
    DEBRIS_MASS_MIN:1.5,
    // PERF: reduced from 350 — hard cap keeps O(n²) collision cost bounded
    MAX_BODIES:     220,
    // PERF: reduced from 55 — large collisions spawn fewer fragments
    MAX_FRAGS:      28,
    MIN_SEP_SPEED:  0.5,
    ROCHE_GRIND_FRAMES: 8,
    ROCHE_FAST_THRESH:  15,
    GRAV_REF_MASS:  50,
    GRAV_RANGE_MAX: 4,
};

// =============================================================================
//  DEBRIS POOL
// =============================================================================
class DebrisPool {
    constructor(scene, capacity) {
        this.scene = scene;
        this.slots = [];
        for (let i = 0; i < capacity; i++) {
            const spr = scene.add.circle(0, 0, 2, 0xffffff, 0);
            spr.setDepth(0).setVisible(false);
            this.slots.push({ spr, active: false });
        }
    }
    acquire(x, y, r, color) {
        const slot = this.slots.find(s => !s.active);
        if (!slot) return null;
        slot.active = true;
        slot.spr.setPosition(x, y).setRadius(r)
                .setFillStyle(color, 1).setVisible(true).setAlpha(1);
        return slot;
    }
    release(slot) {
        if (!slot) return;
        slot.active = false;
        slot.spr.setVisible(false);
    }
    releaseAll() {
        for (const s of this.slots) { s.active = false; s.spr.setVisible(false); }
    }
}

// =============================================================================
//  PLANET TEXTURE GENERATOR
// =============================================================================
class PlanetTextureGen {
    static _rng(seed) {
        let s = seed | 0;
        return () => {
            s = (Math.imul(1664525, s) + 1013904223) | 0;
            return (s >>> 0) / 4294967296;
        };
    }
    static _blend(a, b, t) {
        const ra=(a>>16)&0xff, ga=(a>>8)&0xff, ba=a&0xff;
        const rb=(b>>16)&0xff, gb=(b>>8)&0xff, bb=b&0xff;
        return (Math.round(ra+(rb-ra)*t)<<16)|(Math.round(ga+(gb-ga)*t)<<8)|Math.round(ba+(bb-ba)*t);
    }
    static _tint(c, f) {
        return (Math.min(255,Math.round(((c>>16)&0xff)*f))<<16)|
               (Math.min(255,Math.round(((c>>8 )&0xff)*f))<<8)|
                Math.min(255,Math.round((c&0xff)*f));
    }
    static _rgba(hex, a=1) {
        const r=(hex>>16)&0xff, g=(hex>>8)&0xff, b=hex&0xff;
        return `rgba(${r},${g},${b},${a})`;
    }

    static generate(scene, radius, seed) {
        const r = Math.max(6, Math.round(radius));
        const key = `ptex-${seed}-r${r}`;
        if (scene.textures.exists(key)) return key;
        const rng  = PlanetTextureGen._rng(seed);
        const size = r * 2;
        let type;
        if (r >= 80)      type = 'gas';
        else if (r >= 22) type = ['terran','lava','ice','terran'][Math.floor(rng()*4)];
        else              type = 'rocky';
        const canvas = document.createElement('canvas');
        canvas.width = canvas.height = size;
        const ctx = canvas.getContext('2d');
        ctx.save();
        ctx.beginPath();
        ctx.arc(r, r, r, 0, Math.PI*2);
        ctx.clip();
        switch(type) {
            case 'gas':    PlanetTextureGen._drawGas    (ctx, r, rng); break;
            case 'terran': PlanetTextureGen._drawTerran (ctx, r, rng); break;
            case 'lava':   PlanetTextureGen._drawLava   (ctx, r, rng); break;
            case 'ice':    PlanetTextureGen._drawIce    (ctx, r, rng); break;
            case 'rocky':  PlanetTextureGen._drawRocky  (ctx, r, rng); break;
        }
        PlanetTextureGen._drawAtmosphere(ctx, r, type, rng);
        ctx.restore();
        scene.textures.addCanvas(key, canvas);
        return key;
    }

    static _drawGas(ctx, r, rng) {
        const size = r * 2;
        const palettes = [
            [0xc8966e, 0xe8b87c, 0xd4a068, 0xf0d0a0, 0xa07040],
            [0x8899cc, 0x6677aa, 0xaabbdd, 0xccddee, 0x445588],
            [0xddaa88, 0xcc8866, 0xeecc99, 0xffddaa, 0xbb7755],
            [0x99ccaa, 0x77aa88, 0xbbddcc, 0xaaccbb, 0x558866],
            [0xcc6644, 0xaa4422, 0xee8855, 0xff9966, 0x883322],
        ];
        const pal = palettes[Math.floor(rng() * palettes.length)];
        ctx.fillStyle = PlanetTextureGen._rgba(pal[0]);
        ctx.fillRect(0, 0, size, size);
        const numBands = 6 + Math.floor(rng() * 8);
        for (let i = 0; i < numBands; i++) {
            const yCenter = (i / numBands) * size + rng() * (size / numBands) * 0.5;
            const bandH   = (size / numBands) * (0.3 + rng() * 0.7);
            const col     = pal[Math.floor(rng() * pal.length)];
            const alpha   = 0.4 + rng() * 0.5;
            ctx.beginPath();
            ctx.moveTo(0, yCenter);
            for (let x = 0; x <= size; x += 4) {
                const wave = Math.sin(x * 0.08 + rng() * 6) * bandH * 0.25;
                ctx.lineTo(x, yCenter + wave);
            }
            ctx.lineTo(size, yCenter + bandH);
            ctx.lineTo(0, yCenter + bandH);
            ctx.closePath();
            ctx.fillStyle = PlanetTextureGen._rgba(col, alpha);
            ctx.fill();
        }
        const storms = 1 + Math.floor(rng() * 3);
        for (let i = 0; i < storms; i++) {
            const sx  = r * 0.3 + rng() * r * 1.4;
            const sy  = r * 0.2 + rng() * r * 1.6;
            const sw  = r * (0.12 + rng() * 0.28);
            const sh  = sw * (0.35 + rng() * 0.3);
            const col = pal[Math.floor(rng() * pal.length)];
            ctx.save();
            ctx.translate(sx, sy);
            ctx.rotate(rng() * 0.4 - 0.2);
            ctx.beginPath();
            ctx.ellipse(0, 0, sw, sh, 0, 0, Math.PI*2);
            ctx.fillStyle = PlanetTextureGen._rgba(col, 0.7);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(0, 0, sw*0.55, sh*0.55, 0, 0, Math.PI*2);
            ctx.fillStyle = PlanetTextureGen._rgba(PlanetTextureGen._tint(col, 1.4), 0.5);
            ctx.fill();
            ctx.restore();
        }
        for (let i = 0; i < 18; i++) {
            const y    = rng() * size;
            const len  = size * (0.1 + rng() * 0.5);
            const sx   = rng() * size;
            const col  = pal[Math.floor(rng() * pal.length)];
            ctx.beginPath();
            ctx.moveTo(sx, y);
            ctx.bezierCurveTo(
                sx + len*0.3, y + (rng()-0.5)*8,
                sx + len*0.7, y + (rng()-0.5)*8,
                sx + len,     y + (rng()-0.5)*4
            );
            ctx.strokeStyle = PlanetTextureGen._rgba(col, 0.2 + rng()*0.25);
            ctx.lineWidth = 1 + rng() * 2;
            ctx.stroke();
        }
    }

    static _drawTerran(ctx, r, rng) {
        const size = r * 2;
        const oceanPals = [
            [0x1a5fa8, 0x1e7ac8],
            [0x0d4d6b, 0x147088],
            [0x2d3561, 0x3d4f8a],
        ];
        const op  = oceanPals[Math.floor(rng() * oceanPals.length)];
        const grd = ctx.createLinearGradient(0, 0, 0, size);
        grd.addColorStop(0, PlanetTextureGen._rgba(op[0]));
        grd.addColorStop(1, PlanetTextureGen._rgba(op[1]));
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, size, size);
        const landPals = [
            [0x3a7d44, 0x5a9e5a, 0x8bc34a, 0xc8b860],
            [0x7a5c3a, 0x9a7c5a, 0xb89070, 0xd4a870],
            [0x4a7a55, 0x6aaa65, 0x9acd7a, 0xd0c87a],
        ];
        const lp = landPals[Math.floor(rng() * landPals.length)];
        const numConts = 2 + Math.floor(rng() * 4);
        for (let i = 0; i < numConts; i++) {
            const cx2  = rng() * size;
            const cy2  = rng() * size;
            const pts  = 7 + Math.floor(rng() * 6);
            const base = r * (0.15 + rng() * 0.35);
            ctx.beginPath();
            for (let j = 0; j <= pts; j++) {
                const angle = (j / pts) * Math.PI * 2;
                const rad   = base * (0.6 + rng() * 0.8);
                const px    = cx2 + Math.cos(angle) * rad;
                const py    = cy2 + Math.sin(angle) * rad;
                j === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.fillStyle = PlanetTextureGen._rgba(lp[Math.floor(rng()*lp.length)], 0.9);
            ctx.fill();
            for (let k = 0; k < 4; k++) {
                const mx = cx2 + (rng()-0.5) * base;
                const my = cy2 + (rng()-0.5) * base;
                ctx.beginPath();
                ctx.arc(mx, my, base * (0.05 + rng() * 0.12), 0, Math.PI*2);
                ctx.fillStyle = PlanetTextureGen._rgba(PlanetTextureGen._tint(lp[0], 0.75), 0.5);
                ctx.fill();
            }
        }
        for (let i = 0; i < 12; i++) {
            const cx2 = rng() * size;
            const cy2 = rng() * size;
            const cw  = r * (0.15 + rng() * 0.4);
            const ch  = cw * (0.18 + rng() * 0.22);
            ctx.beginPath();
            ctx.ellipse(cx2, cy2, cw, ch, rng() * Math.PI, 0, Math.PI*2);
            ctx.fillStyle = `rgba(255,255,255,${0.15 + rng()*0.3})`;
            ctx.fill();
        }
    }

    static _drawLava(ctx, r, rng) {
        const size = r * 2;
        ctx.fillStyle = PlanetTextureGen._rgba(0x1a0a00);
        ctx.fillRect(0, 0, size, size);
        const lavaCols = [0xff4400, 0xff7700, 0xffaa00, 0xff2200];
        const numCracks = 8 + Math.floor(rng() * 10);
        for (let i = 0; i < numCracks; i++) {
            let x = rng() * size, y = rng() * size;
            ctx.beginPath();
            ctx.moveTo(x, y);
            const steps = 4 + Math.floor(rng() * 8);
            for (let s = 0; s < steps; s++) {
                x += (rng()-0.5) * r * 0.5;
                y += (rng()-0.5) * r * 0.5;
                ctx.lineTo(x, y);
            }
            const col = lavaCols[Math.floor(rng() * lavaCols.length)];
            ctx.strokeStyle = PlanetTextureGen._rgba(col, 0.7 + rng()*0.3);
            ctx.lineWidth   = 1 + rng() * 3;
            ctx.stroke();
        }
        const numPools = 3 + Math.floor(rng() * 5);
        for (let i = 0; i < numPools; i++) {
            const px  = rng() * size;
            const py  = rng() * size;
            const pr  = r * (0.04 + rng() * 0.15);
            const col = lavaCols[Math.floor(rng() * lavaCols.length)];
            const grd = ctx.createRadialGradient(px, py, 0, px, py, pr);
            grd.addColorStop(0,   PlanetTextureGen._rgba(0xffffff, 0.9));
            grd.addColorStop(0.3, PlanetTextureGen._rgba(col,      0.8));
            grd.addColorStop(1,   PlanetTextureGen._rgba(col,      0));
            ctx.beginPath();
            ctx.arc(px, py, pr, 0, Math.PI*2);
            ctx.fillStyle = grd;
            ctx.fill();
        }
        for (let i = 0; i < 30; i++) {
            const rx = rng() * size, ry = rng() * size;
            const rr = r * (0.03 + rng() * 0.08);
            ctx.beginPath();
            ctx.arc(rx, ry, rr, 0, Math.PI*2);
            const f = 0.3 + rng() * 0.4;
            ctx.fillStyle = PlanetTextureGen._rgba(PlanetTextureGen._tint(0x2a1000, 1/f), 0.5);
            ctx.fill();
        }
    }

    static _drawIce(ctx, r, rng) {
        const size = r * 2;
        const grd = ctx.createRadialGradient(r*0.6, r*0.4, 0, r, r, r*1.2);
        grd.addColorStop(0,   '#eef8ff');
        grd.addColorStop(0.5, '#c8e8f8');
        grd.addColorStop(1,   '#88b8d8');
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, size, size);
        const crackCols = [0x88c8e8, 0x6699bb, 0xaaddf0, 0x4477aa];
        for (let i = 0; i < 20; i++) {
            let x = rng() * size, y = rng() * size;
            ctx.beginPath();
            ctx.moveTo(x, y);
            const steps = 3 + Math.floor(rng() * 6);
            for (let s = 0; s < steps; s++) {
                x += (rng()-0.5) * r * 0.4;
                y += (rng()-0.5) * r * 0.4;
                ctx.lineTo(x, y);
            }
            const col = crackCols[Math.floor(rng() * crackCols.length)];
            ctx.strokeStyle = PlanetTextureGen._rgba(col, 0.4 + rng()*0.4);
            ctx.lineWidth   = 0.5 + rng() * 1.5;
            ctx.stroke();
        }
        for (let i = 0; i < 5; i++) {
            const px = rng() * size, py = rng() * size;
            const pr = r * (0.1 + rng() * 0.25);
            ctx.beginPath();
            ctx.ellipse(px, py, pr, pr*(0.4+rng()*0.6), rng()*Math.PI, 0, Math.PI*2);
            ctx.fillStyle = `rgba(100,170,220,${0.25 + rng()*0.25})`;
            ctx.fill();
        }
        for (let i = 0; i < 25; i++) {
            const sx = rng() * size, sy = rng() * size;
            ctx.beginPath();
            ctx.arc(sx, sy, r*(0.01+rng()*0.04), 0, Math.PI*2);
            ctx.fillStyle = `rgba(255,255,255,${0.3+rng()*0.5})`;
            ctx.fill();
        }
    }

    static _drawRocky(ctx, r, rng) {
        const size = r * 2;
        const hues = [0x888888, 0x8a8070, 0x707878, 0x806868, 0x787068];
        const base = hues[Math.floor(rng() * hues.length)];
        const grd = ctx.createRadialGradient(r*0.55, r*0.45, 0, r, r, r);
        grd.addColorStop(0,   PlanetTextureGen._rgba(PlanetTextureGen._tint(base, 1.5)));
        grd.addColorStop(0.5, PlanetTextureGen._rgba(base));
        grd.addColorStop(1,   PlanetTextureGen._rgba(PlanetTextureGen._tint(base, 0.5)));
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, size, size);
        for (let i = 0; i < 60; i++) {
            const gx = rng() * size, gy = rng() * size;
            const gr = r * (0.02 + rng() * 0.07);
            const f  = 0.7 + rng() * 0.6;
            ctx.beginPath();
            ctx.arc(gx, gy, gr, 0, Math.PI*2);
            ctx.fillStyle = PlanetTextureGen._rgba(PlanetTextureGen._tint(base, f), 0.35);
            ctx.fill();
        }
        const numCraters = 4 + Math.floor(rng() * (r < 14 ? 5 : 9));
        for (let i = 0; i < numCraters; i++) {
            const cx2 = r * 0.15 + rng() * r * 1.7;
            const cy2 = r * 0.15 + rng() * r * 1.7;
            const cr  = r * (0.05 + rng() * 0.22);
            ctx.beginPath();
            ctx.arc(cx2, cy2, cr * 1.6, 0, Math.PI*2);
            ctx.fillStyle = PlanetTextureGen._rgba(PlanetTextureGen._tint(base, 1.15), 0.25);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx2, cy2, cr, 0, Math.PI*2);
            ctx.strokeStyle = PlanetTextureGen._rgba(PlanetTextureGen._tint(base, 1.6), 0.7);
            ctx.lineWidth = Math.max(0.5, cr * 0.18);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(cx2, cy2, cr * 0.78, 0, Math.PI*2);
            ctx.fillStyle = PlanetTextureGen._rgba(PlanetTextureGen._tint(base, 0.45), 0.8);
            ctx.fill();
            if (cr > r * 0.1) {
                ctx.beginPath();
                ctx.arc(cx2, cy2, cr * 0.12, 0, Math.PI*2);
                ctx.fillStyle = PlanetTextureGen._rgba(PlanetTextureGen._tint(base, 1.3), 0.7);
                ctx.fill();
            }
        }
        for (let i = 0; i < 12; i++) {
            const cx2 = rng() * size, cy2 = rng() * size;
            const cr  = r * (0.015 + rng() * 0.04);
            ctx.beginPath();
            ctx.arc(cx2, cy2, cr, 0, Math.PI*2);
            ctx.fillStyle = PlanetTextureGen._rgba(PlanetTextureGen._tint(base, 0.5), 0.5);
            ctx.fill();
        }
    }

    static _drawAtmosphere(ctx, r, type, rng) {
        const atmColors = {
            gas:    [0xffffff, 0.12],
            terran: [0x88ccff, 0.22],
            lava:   [0xff6600, 0.18],
            ice:    [0xaaddff, 0.20],
            rocky:  [0x000000, 0.0],
        };
        const [col, maxA] = atmColors[type] || [0xffffff, 0.1];
        if (maxA <= 0) return;
        const size = r * 2;
        const grd  = ctx.createRadialGradient(r, r, r * 0.72, r, r, r);
        grd.addColorStop(0,   PlanetTextureGen._rgba(col, 0));
        grd.addColorStop(0.6, PlanetTextureGen._rgba(col, maxA * 0.3));
        grd.addColorStop(1,   PlanetTextureGen._rgba(col, maxA));
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, size, size);
    }

    static regenerate(scene, oldKey, radius, seed) {
        if (oldKey && scene.textures.exists(oldKey)) scene.textures.remove(oldKey);
        return PlanetTextureGen.generate(scene, radius, seed);
    }

    static shouldHaveRings(radius, seed) {
        const rng = PlanetTextureGen._rng(seed ^ 0xdeadbeef);
        return radius >= 38 && rng() < 0.42;
    }

    static generateRing(scene, radius, seed) {
        const rng     = PlanetTextureGen._rng(seed ^ 0xc0ffee);
        const key     = `pring-${seed}-r${Math.round(radius)}`;
        if (scene.textures.exists(key)) return key;
        const innerR  = radius * (1.28 + rng() * 0.18);
        const outerR  = radius * (2.1  + rng() * 0.9);
        const tiltY   = 0.22 + rng() * 0.22;
        const numBands = 3 + Math.floor(rng() * 4);
        const canvasW = Math.ceil(outerR * 2 + 4);
        const canvasH = Math.ceil(outerR * tiltY * 2 + 4);
        const cx      = canvasW / 2;
        const cy      = canvasH / 2;
        const canvas  = document.createElement('canvas');
        canvas.width  = canvasW;
        canvas.height = canvasH;
        const ctx     = canvas.getContext('2d');
        const ringPalettes = [
            [0xd4b896, 0xc8a878, 0xe8d4b0, 0xb09070, 0x988060],
            [0x88aacc, 0x6688aa, 0xaaccee, 0x7799bb, 0x557799],
            [0xccccaa, 0xbbbb88, 0xddddcc, 0xaaaaaa, 0x999977],
            [0xcc9966, 0xbb8844, 0xddbb88, 0xaa7744, 0x996633],
            [0x99bbaa, 0x77998a, 0xbbddcc, 0x88aaa0, 0x669988],
        ];
        const pal = ringPalettes[Math.floor(rng() * ringPalettes.length)];
        for (let b = numBands - 1; b >= 0; b--) {
            const t0   = b / numBands;
            const t1   = (b + 1) / numBands;
            const r0   = innerR + (outerR - innerR) * t0;
            const r1   = innerR + (outerR - innerR) * t1;
            const col  = pal[b % pal.length];
            const gap  = rng() < 0.35;
            if (gap && b > 0 && b < numBands - 1) continue;
            ctx.beginPath();
            ctx.ellipse(cx, cy, r1, r1 * tiltY, 0, 0, Math.PI * 2);
            ctx.ellipse(cx, cy, r0, r0 * tiltY, 0, 0, Math.PI * 2);
            const alpha = 0.55 + rng() * 0.35;
            ctx.fillStyle = PlanetTextureGen._rgba(col, alpha);
            ctx.fill('evenodd');
        }
        scene.textures.addCanvas(key, canvas);
        return { key, canvasW, canvasH, innerR, outerR, tiltY };
    }

    static regenerateRing(scene, oldKey, radius, seed) {
        if (oldKey && scene.textures.exists(oldKey)) scene.textures.remove(oldKey);
        return PlanetTextureGen.generateRing(scene, radius, seed);
    }
}

// =============================================================================
//  PLANET
// =============================================================================
class Planet {
    constructor(scene, x, y, opts = {}) {
        this.scene    = scene;
        this.planetId = scene.planetCounter++;
        const radius = (typeof opts.radius === 'number' && opts.radius > 0)
            ? opts.radius : Phaser.Math.Between(10, 42);
        this.radius = radius;
        this.mass   = (typeof opts.mass === 'number' && opts.mass > 0)
            ? opts.mass : Math.max(4, radius * radius * 0.13);
        this.color  = (typeof opts.color === 'number')
            ? opts.color : Phaser.Utils.Array.GetRandom(scene.planetColours);
        this.x  = x;  this.y  = y;
        this.vx = (typeof opts.vx === 'number') ? opts.vx : 0;
        this.vy = (typeof opts.vy === 'number') ? opts.vy : 0;
        this.ax = 0;  this.ay = 0;
        this.isDragged       = false;
        this.mergedThisFrame = false;
        this.isDebris        = !!opts.isDebris;
        this.lifetime        = this.isDebris ? PHY.DEBRIS_LIFE_MS : Infinity;
        this.poolSlot = null;
        this.sprite   = null;
        this.hitArea  = null;
        this.ringBack = null;
        this.ringFront= null;
        this.ringMeta = null;
        this.texSeed = (typeof opts.texSeed === 'number')
            ? opts.texSeed
            : (Math.random() * 0x7fffffff) | 0;
        this.texKey  = null;

        // PERF: track the radius at which the texture was last generated
        // so we can skip regeneration when the change is negligible
        this._lastTexRadius = 0;

        if (this.isDebris && radius <= 4) {
            const slot = scene.debrisPool.acquire(x, y, radius, this.color);
            if (slot) { this.poolSlot = slot; this.sprite = slot.spr; return; }
        }
        if (this.isDebris) {
            this.sprite = scene.add.circle(x, y, radius, this.color);
            this.sprite.setDepth(0);
        } else {
            this.texKey = PlanetTextureGen.generate(scene, radius, this.texSeed);
            this._lastTexRadius = radius;
            this.sprite = scene.add.image(x, y, this.texKey);
            this.sprite.setDepth(1);
            this.sprite.setDisplaySize(radius * 2, radius * 2);
            if (PlanetTextureGen.shouldHaveRings(radius, this.texSeed)) {
                this._buildRingSprites(scene, x, y, radius);
            }
        }
        if (!this.isDebris) {
            const hitR = radius;
            this.hitArea = scene.add.circle(x, y, hitR, 0xffffff, 0);
            this.hitArea.setDepth(2);
            this.hitArea.setInteractive({
                hitArea:         new Phaser.Geom.Circle(0, 0, hitR),
                hitAreaCallback: Phaser.Geom.Circle.Contains,
                useHandCursor:   true,
                draggable:       true,
            });
            this.hitArea.on('pointerdown', ptr => {
                scene.selectPlanet(this);
                if (ptr && ptr.event) ptr.event.stopPropagation();
                const right = (ptr.event && ptr.event.button === 2) ||
                              (typeof ptr.rightButtonDown === 'function' && ptr.rightButtonDown());
                if (right) scene.showPlanetMenu(
                    (ptr.event && ptr.event.clientX) || ptr.x,
                    (ptr.event && ptr.event.clientY) || ptr.y);
            });
            this.hitArea.on('dragstart', () => { this.isDragged = true; this.vx = this.vy = 0; });
            this.hitArea.on('drag', (_p, dx, dy) => {
                if (!this.isDragged) return;
                this.x = dx; this.y = dy;
                this._sync(); scene.updateSelectionRing();
            });
            this.hitArea.on('dragend', () => { this.isDragged = false; });
        }
    }

    _buildRingSprites(scene, x, y, radius) {
        const meta = PlanetTextureGen.generateRing(scene, radius, this.texSeed);
        this.ringMeta = meta;
        const backKey  = meta.key + '-back';
        const frontKey = meta.key + '-front';
        this._makeHalfRingTexture(scene, meta, backKey,  'back');
        this._makeHalfRingTexture(scene, meta, frontKey, 'front');
        this.ringBack  = scene.add.image(x, y, backKey).setDepth(0.5);
        this.ringFront = scene.add.image(x, y, frontKey).setDepth(1.5);
        this.ringBack.setDisplaySize(meta.canvasW, meta.canvasH);
        this.ringFront.setDisplaySize(meta.canvasW, meta.canvasH);
    }

    _makeHalfRingTexture(scene, meta, key, half) {
        if (scene.textures.exists(key)) return;
        const { canvasW, canvasH } = meta;
        const srcCanvas = scene.textures.get(meta.key).getSourceImage();
        const canvas  = document.createElement('canvas');
        canvas.width  = canvasW;
        canvas.height = canvasH;
        const ctx     = canvas.getContext('2d');
        ctx.drawImage(srcCanvas, 0, 0);
        ctx.globalCompositeOperation = 'destination-out';
        ctx.fillStyle = 'black';
        if (half === 'back') {
            ctx.fillRect(0, canvasH / 2, canvasW, canvasH / 2);
        } else {
            ctx.fillRect(0, 0, canvasW, canvasH / 2);
        }
        scene.textures.addCanvas(key, canvas);
    }

    integrate(dt) {
        if (this.isDragged) { this.ax = 0; this.ay = 0; return; }
        this.vx += this.ax * dt;  this.vy += this.ay * dt;
        this.x  += this.vx * dt;  this.y  += this.vy * dt;
        this.ax  = 0; this.ay = 0;
        this._sync();
        if (this.isDebris) {
            this.lifetime -= dt * 1000;
            if (this.sprite) this.sprite.setAlpha(Math.max(0, Math.min(1, this.lifetime / 8000)));
        }
    }

    _sync() {
        if (this.sprite)     this.sprite.setPosition(this.x, this.y);
        if (this.hitArea)    this.hitArea.setPosition(this.x, this.y);
        if (this.ringBack)   this.ringBack.setPosition(this.x, this.y);
        if (this.ringFront)  this.ringFront.setPosition(this.x, this.y);
    }

    refreshSprite() {
        if (!this.sprite) return;
        if (this.isDebris) {
            if (typeof this.sprite.setRadius === 'function') {
                this.sprite.setRadius(this.radius);
            }
        } else {
            // PERF: only regenerate the texture if radius changed by more than 5%.
            // Merges that absorb small bodies barely change the visual size —
            // updating the canvas texture every time causes a big GC/draw spike.
            const radiusChangeFrac = Math.abs(this.radius - this._lastTexRadius) / (this._lastTexRadius || 1);
            if (radiusChangeFrac > 0.05) {
                this.texKey = PlanetTextureGen.regenerate(this.scene, this.texKey, this.radius, this.texSeed);
                this._lastTexRadius = this.radius;
                this.sprite.setTexture(this.texKey);
                this._destroyRingSprites();
                if (PlanetTextureGen.shouldHaveRings(this.radius, this.texSeed)) {
                    this._buildRingSprites(this.scene, this.x, this.y, this.radius);
                }
            }
            // Always update the display size, even without a full texture regen
            this.sprite.setDisplaySize(this.radius * 2, this.radius * 2);
        }
        if (this.hitArea) {
            const hitR = this.radius;
            this.hitArea.setRadius(hitR);
            if (this.hitArea.input) this.hitArea.input.hitArea = new Phaser.Geom.Circle(0, 0, hitR);
        }
    }

    _destroyRingSprites() {
        if (this.ringBack) {
            const bk = this.ringBack.texture?.key;
            const fk = this.ringFront?.texture?.key;
            this.ringBack.destroy();
            if (this.ringFront) this.ringFront.destroy();
            if (bk && this.scene.textures.exists(bk)) this.scene.textures.remove(bk);
            if (fk && this.scene.textures.exists(fk)) this.scene.textures.remove(fk);
            if (this.ringMeta?.key && this.scene.textures.exists(this.ringMeta.key))
                this.scene.textures.remove(this.ringMeta.key);
        }
        this.ringBack  = null;
        this.ringFront = null;
        this.ringMeta  = null;
    }

    destroy() {
        if (this.poolSlot) {
            this.scene.debrisPool.release(this.poolSlot);
            this.poolSlot = null;
        } else {
            if (this.sprite)  this.sprite.destroy();
            if (this.hitArea) this.hitArea.destroy();
            if (this.texKey && this.scene.textures.exists(this.texKey)) {
                this.scene.textures.remove(this.texKey);
            }
            this._destroyRingSprites();
        }
        this.sprite = null; this.hitArea = null; this.texKey = null;
    }

    getState() {
        return { x: this.x, y: this.y, radius: this.radius,
                 mass: this.mass, vx: this.vx, vy: this.vy,
                 color: this.color, texSeed: this.texSeed };
    }

    setFriction() {}
}

// =============================================================================
//  OPENING SCREEN
// =============================================================================
class OpeningScreen extends Phaser.Scene {
    constructor() { super('OpeningScreen'); }

    create() {
        const cx = this.cameras.main.centerX;
        const cy = this.cameras.main.centerY;
        const sw = this.scale.width;
        const sh = this.scale.height;

        this.planetList     = [];
        this.planetCounter  = 0;
        this._gravGrid      = new Map();
        this._collGrid      = new Map();
        this._rocheContacts = new Map();

        // PERF: pre-allocated reusable neighbor scratch array
        this._neighborScratch = [];

        this.planetColours = [
            0xff4444, 0xdc143c, 0xff7043, 0xff8c00,
            0xffd700, 0xc8ff40, 0x00e676, 0x1de9b6,
            0x40c4ff, 0x448aff, 0x9c6fff, 0xe040fb,
            0xf48fb1, 0xffffff, 0xaec6cf, 0x80cbc4,
        ];

        this.debrisPool = new DebrisPool(this, 60);

        this.stars = this.add.group();
        for (let i = 0; i < 100; i++) {
            const star = this.add.circle(
                Phaser.Math.Between(0, sw),
                Phaser.Math.Between(0, sh),
                Phaser.Math.Between(1, 2), 0xffffff
            ).setDepth(-1).setAlpha(Phaser.Math.FloatBetween(0.3, 0.9));
            star.twinkleSpeed = Phaser.Math.FloatBetween(0.6, 2.0);
            star.twinklePhase = Phaser.Math.FloatBetween(0, Math.PI * 2);
            star.baseAlpha    = star.alpha;
            this.stars.add(star);
        }

        const pad = 100;
        const configs = [
            Phaser.Math.Between(42, 62), Phaser.Math.Between(40, 58),
            Phaser.Math.Between(18, 36), Phaser.Math.Between(16, 32),
            Phaser.Math.Between(14, 28), Phaser.Math.Between(12, 24),
            Phaser.Math.Between(10, 20),
        ];
        for (const radius of configs) {
            const speed = Phaser.Math.FloatBetween(10, 30);
            const angle = Phaser.Math.FloatBetween(0, Math.PI * 2);
            this._spawnPlanet({
                x:  Phaser.Math.FloatBetween(pad, sw - pad),
                y:  Phaser.Math.FloatBetween(pad, sh - pad),
                radius,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
            });
        }

        this.add.rectangle(cx, cy - 178, 400, 72, 0x00ffe7, 0.04)
            .setStrokeStyle(1, 0x00ffe7, 0.25).setDepth(10);

        this.titleText = this.add.text(cx, cy - 178, 'SYSTEM SIM', {
            fontFamily: '"Courier New", monospace', fontSize: '44px',
            color: '#00ffe7', letterSpacing: 18, stroke: '#003333', strokeThickness: 4,
        }).setOrigin(0.5).setDepth(11);

        this.add.graphics().setDepth(10)
            .lineStyle(1, 0x00ffe7, 0.4)
            .lineBetween(cx - 180, cy - 148, cx + 180, cy - 148);

        this.add.text(cx, cy - 132, 'v0.1.0  //  ORBITAL SANDBOX', {
            fontFamily: '"Courier New", monospace', fontSize: '11px',
            color: '#4ecdc4', letterSpacing: 5, alpha: 0.7,
        }).setOrigin(0.5).setDepth(10);

        this.tweens.add({ targets: this.titleText, alpha: { from: 1, to: 0.75 },
            duration: 2400, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });

        const buttonData = [
            { label: 'NEW GAME',  action: () => this.scene.start('MainGame', { freshStart: true  }) },
            { label: 'LOAD GAME', action: () => this.scene.start('MainGame', { freshStart: false }) },
            { label: 'OPTIONS',   action: () => this.scene.start('Options') },
            { label: 'QUIT GAME', action: () => { try { window.close(); } catch(e) {} } },
        ];
        const startY = cy - 48, spacing = 62;
        buttonData.forEach((btn, i) => {
            const by = startY + i * spacing;
            const bg = this.add.rectangle(cx, by, 220, 44, 0x001a2a)
                .setStrokeStyle(1, 0x00ffe7, 0.5).setDepth(10).setInteractive({ useHandCursor: true });
            const lbl = this.add.text(cx, by, btn.label, {
                fontFamily: '"Courier New", monospace', fontSize: '17px',
                color: '#00ffe7', letterSpacing: 5,
            }).setOrigin(0.5).setDepth(11);
            bg.setAlpha(0); lbl.setAlpha(0);
            this.tweens.add({ targets: [bg, lbl], alpha: 1, duration: 300,
                delay: 200 + i * 90, ease: 'Sine.easeOut' });
            bg.on('pointerover', () => { bg.setFillStyle(0x00ffe7, 0.14); lbl.setStyle({ color: '#ffffff' });
                this.tweens.add({ targets: [bg, lbl], scaleX: 1.04, scaleY: 1.04, duration: 110, ease: 'Sine.easeOut' }); });
            bg.on('pointerout',  () => { bg.setFillStyle(0x001a2a); lbl.setStyle({ color: '#00ffe7' });
                this.tweens.add({ targets: [bg, lbl], scaleX: 1, scaleY: 1, duration: 110, ease: 'Sine.easeIn' }); });
            bg.on('pointerdown', () => {
                this.cameras.main.fade(200, 0, 0, 0);
                this.time.delayedCall(200, btn.action);
            });
        });

        this.cameras.main.fadeIn(400, 0, 0, 0);
    }

    _vfxMerge(x, y, r) {
        const explosionsOn = typeof GameSettings === 'undefined' || GameSettings.explosions;
        if (!explosionsOn) return;
        const g = this.add.graphics().setDepth(20);
        let t = 0; const dur = 300;
        const ev = this.time.addEvent({ delay: 16, repeat: Math.ceil(dur / 16),
            callback: () => {
                t += 16; const p = t / dur;
                g.clear();
                g.fillStyle(0xffffff, (1 - p) * 0.75);
                g.fillCircle(x, y, r * (0.5 + p * 0.7));
                if (p >= 1) { g.destroy(); ev.remove(); }
            }
        });
    }

    _vfxDisrupt(x, y, r) {
        const explosionsOn = typeof GameSettings === 'undefined' || GameSettings.explosions;
        if (!explosionsOn) return;
        const g = this.add.graphics().setDepth(20);
        let t = 0; const dur = 500;
        const ev = this.time.addEvent({ delay: 16, repeat: Math.ceil(dur / 16),
            callback: () => {
                t += 16; const p = t / dur;
                g.clear();
                g.fillStyle(0xff7700, (1 - p) * 0.5);
                g.fillCircle(x, y, r * (1 + p * 2.2));
                g.lineStyle(3 * (1 - p), 0xffbb00, (1 - p) * 0.9);
                g.strokeCircle(x, y, r * (1.3 + p * 2.8));
                if (p >= 1) { g.destroy(); ev.remove(); }
            }
        });
    }

    static get MAX_OS_BODIES() { return 14; }

    // PERF: integer hash avoids string allocation on every pair check
    _cellKey(gx, gy) { return ((gx & 0xffff) | ((gy & 0xffff) << 16)) >>> 0; }

    _buildGrid(bodies, cs, grid) {
        grid.clear();
        for (const b of bodies) {
            const k = this._cellKey(Math.floor(b.x / cs), Math.floor(b.y / cs));
            if (!grid.has(k)) grid.set(k, []);
            grid.get(k).push(b);
        }
    }

    // PERF: reuse the scratch array instead of allocating a new one each call
    _getNeighbors(b, cs, grid) {
        const out = this._neighborScratch;
        out.length = 0;
        const gx = Math.floor(b.x / cs), gy = Math.floor(b.y / cs);
        for (let dx = -1; dx <= 1; dx++)
            for (let dy = -1; dy <= 1; dy++) {
                const cell = grid.get(this._cellKey(gx + dx, gy + dy));
                if (cell) for (const nb of cell) out.push(nb);
            }
        return out;
    }

    _applyGravity(bodies) {
        const G = PHY.G, eps2 = PHY.SOFT * PHY.SOFT;
        const baseD = PHY.MAX_GRAV_D, refMass = PHY.GRAV_REF_MASS, rangeMax = PHY.GRAV_RANGE_MAX;
        // PERF: integer-keyed Set instead of string-keyed — drastically less GC
        const done = new Set();
        for (const a of bodies) {
            for (const b of this._getNeighbors(a, PHY.GRAV_CELL, this._gravGrid)) {
                if (b === a) continue;
                // Pack two 16-bit IDs into one 32-bit integer key
                const lo = a.planetId < b.planetId ? a.planetId : b.planetId;
                const hi = a.planetId < b.planetId ? b.planetId : a.planetId;
                const id = (lo << 16) | hi;
                if (done.has(id)) continue;
                done.add(id);
                const dx = b.x - a.x, dy = b.y - a.y, d2 = dx*dx + dy*dy;
                const scaleA = Math.min(rangeMax, Math.sqrt(a.mass / refMass));
                const scaleB = Math.min(rangeMax, Math.sqrt(b.mass / refMass));
                if (d2 > (baseD * Math.max(scaleA, scaleB)) ** 2) continue;
                const inv = G / Math.pow(d2 + eps2, 1.5);
                a.ax += inv * b.mass * dx;  a.ay += inv * b.mass * dy;
                b.ax -= inv * a.mass * dx;  b.ay -= inv * a.mass * dy;
            }
        }
    }

    _handleCollisions(bodies) {
        for (const b of bodies) b.mergedThisFrame = false;
        const toRemove = [], done = new Set(), activeGrind = new Set();
        for (const a of bodies) {
            if (a.mergedThisFrame) continue;
            for (const b of this._getNeighbors(a, PHY.GRID_CELL, this._collGrid)) {
                if (b === a || b.mergedThisFrame || a.mergedThisFrame) continue;
                // PERF: integer pair key
                const lo = a.planetId < b.planetId ? a.planetId : b.planetId;
                const hi = a.planetId < b.planetId ? b.planetId : a.planetId;
                const id = (lo << 16) | hi;
                if (done.has(id)) continue;
                done.add(id);
                const dx   = b.x - a.x, dy = b.y - a.y;
                const dist = Math.sqrt(dx*dx + dy*dy) || 0.001;
                const sumR = a.radius + b.radius;
                if (dist >= sumR) continue;
                const ratio = dist / sumR;
                const [big, sml] = a.mass >= b.mass ? [a, b] : [b, a];
                if (ratio < PHY.MERGE_FRAC) {
                    this._rocheContacts.delete(id);
                    const mT  = a.mass + b.mass;
                    const nvx = (a.vx * a.mass + b.vx * b.mass) / mT;
                    const nvy = (a.vy * a.mass + b.vy * b.mass) / mT;
                    big.radius = Math.sqrt(big.radius**2 + sml.radius**2);
                    big.mass   = mT;
                    big.vx = nvx; big.vy = nvy;
                    big.color  = this._blendColors(big.color, sml.color, sml.mass / mT);
                    big.refreshSprite();
                    big.mergedThisFrame = true;
                    sml.mergedThisFrame = true;
                    toRemove.push(sml);
                    this._vfxMerge((a.x + b.x) * 0.5, (a.y + b.y) * 0.5, big.radius);
                    continue;
                }
                if (sml.radius <= 5) {
                    this._bounce(a, b, dx, dy, dist, sumR);
                    continue;
                }
                activeGrind.add(id);
                const grindCount = (this._rocheContacts.get(id) || 0) + 1;
                this._rocheContacts.set(id, grindCount);
                const relVx = sml.vx - big.vx, relVy = sml.vy - big.vy;
                const speed = Math.sqrt(relVx*relVx + relVy*relVy);
                const shouldMerge = speed >= PHY.ROCHE_FAST_THRESH || grindCount >= PHY.ROCHE_GRIND_FRAMES;
                if (shouldMerge) {
                    this._rocheContacts.delete(id);
                    const mT  = a.mass + b.mass;
                    const nvx = (a.vx * a.mass + b.vx * b.mass) / mT;
                    const nvy = (a.vy * a.mass + b.vy * b.mass) / mT;
                    big.radius = Math.sqrt(big.radius**2 + sml.radius**2);
                    big.mass   = mT;
                    big.vx = nvx; big.vy = nvy;
                    big.color  = this._blendColors(big.color, sml.color, sml.mass / mT);
                    big.refreshSprite();
                    big.mergedThisFrame = true;
                    sml.mergedThisFrame = true;
                    toRemove.push(sml);
                    this._vfxDisrupt((a.x + b.x) * 0.5, (a.y + b.y) * 0.5, sml.radius);
                    this._vfxMerge(big.x, big.y, big.radius);
                } else {
                    this._depenetrate(a, b, dx, dy, dist, sumR);
                }
            }
        }
        for (const [pid] of this._rocheContacts)
            if (!activeGrind.has(pid)) this._rocheContacts.delete(pid);
        for (const dead of toRemove) this._removePlanet(dead);
    }

    _depenetrate(a, b, dx, dy, dist, sumR) {
        const nx = dx/dist, ny = dy/dist, mT = a.mass + b.mass, ov = sumR - dist;
        a.x -= nx * ov * (b.mass / mT); a.y -= ny * ov * (b.mass / mT);
        b.x += nx * ov * (a.mass / mT); b.y += ny * ov * (a.mass / mT);
        a._sync(); b._sync();
    }

    _bounce(a, b, dx, dy, dist, sumR) {
        this._depenetrate(a, b, dx, dy, dist, sumR);
        const nx = dx/dist, ny = dy/dist;
        const rvx = b.vx - a.vx, rvy = b.vy - a.vy, vN = rvx*nx + rvy*ny;
        if (vN >= 0) return;
        const invM = 1/a.mass + 1/b.mass, j = -(1 + PHY.BOUNCE_E) * vN / invM;
        a.vx -= (j/a.mass)*nx; a.vy -= (j/a.mass)*ny;
        b.vx += (j/b.mass)*nx; b.vy += (j/b.mass)*ny;
    }

    _spawnPlanet(opts) {
        const nonDebris = this.planetList.filter(p => !p.isDebris).length;
        if (nonDebris >= OpeningScreen.MAX_OS_BODIES) return null;
        const p = new Planet(this, opts.x, opts.y, opts);
        this.planetList.push(p);
        return p;
    }

    _removePlanet(p) {
        const i = this.planetList.indexOf(p);
        if (i !== -1) this.planetList.splice(i, 1);
        p.destroy();
    }

    _wrapPlanets() {
        const sw = this.scale.width, sh = this.scale.height;
        for (const p of this.planetList) {
            const r = p.radius + 2;
            if (p.x < -r)       { p.x += sw + r*2; p._sync(); }
            if (p.x >  sw + r)  { p.x -= sw + r*2; p._sync(); }
            if (p.y < -r)       { p.y += sh + r*2; p._sync(); }
            if (p.y >  sh + r)  { p.y -= sh + r*2; p._sync(); }
        }
    }

    _blendColors(cA, cB, t) {
        const rA=(cA>>16)&0xff, gA=(cA>>8)&0xff, bA=cA&0xff;
        const rB=(cB>>16)&0xff, gB=(cB>>8)&0xff, bB=cB&0xff;
        return (Math.round(rA+(rB-rA)*t)<<16)|(Math.round(gA+(gB-gA)*t)<<8)|Math.round(bA+(bB-bA)*t);
    }

    _tintColor(c, f) {
        return (Math.min(255,Math.round(((c>>16)&0xff)*f))<<16)|
               (Math.min(255,Math.round(((c>>8)&0xff)*f))<<8)|
                Math.min(255,Math.round((c&0xff)*f));
    }

    update(time, delta) {
        this.stars.children.iterate(star => {
            star.alpha = star.baseAlpha * (0.6 + 0.4 * Math.sin(
                time * 0.001 * star.twinkleSpeed + star.twinklePhase));
        });
        const dt     = Math.min(delta, 50) / 1000;
        const bodies = this.planetList;
        if (bodies.length > 0) {
            this._buildGrid(bodies, PHY.GRAV_CELL, this._gravGrid);
            this._buildGrid(bodies, PHY.GRID_CELL,  this._collGrid);
            this._applyGravity(bodies);
            for (const b of bodies) b.integrate(dt);
            this._handleCollisions(bodies);
            this._wrapPlanets();
        }
    }

    shutdown() {
        for (const p of [...this.planetList]) p.destroy();
        this.planetList = [];
        this.debrisPool.releaseAll();
    }
}

// =============================================================================
//  OPTIONS SCENE
// =============================================================================
class Options extends Phaser.Scene {
    constructor() { super('Options'); }

    create() {
        const { width, height } = this.cameras.main;
        const cx = width / 2;
        const cy = height / 2;

        this.add.rectangle(cx, cy, width, height, 0x000812);

        const scanGfx = this.add.graphics();
        scanGfx.fillStyle(0x000000, 0.18);
        for (let y = 0; y < height; y += 4) scanGfx.fillRect(0, y, width, 2);

        const gridGfx = this.add.graphics();
        gridGfx.lineStyle(1, 0x00ffe7, 0.05);
        for (let x = 0; x < width; x += 40) gridGfx.lineBetween(x, 0, x, height);
        for (let y = 0; y < height; y += 40) gridGfx.lineBetween(0, y, width, y);

        this._drawCorners(cx, cy, width, height);

        this.add.rectangle(cx, cy - 148, 260, 54, 0x00ffe7, 0.06)
            .setStrokeStyle(1, 0x00ffe7, 0.4);

        this.add.text(cx, cy - 148, 'OPTIONS', {
            fontFamily: '"Courier New", monospace',
            fontSize: '36px',
            color: '#00ffe7',
            letterSpacing: 14,
        }).setOrigin(0.5);

        this.add.graphics()
            .lineStyle(1, 0x00ffe7, 0.5)
            .lineBetween(cx - 180, cy - 120, cx + 180, cy - 120);

        const settings = [
            { label: 'AUDIO',        value: 'ON',      values: ['ON', 'OFF'] },
            { label: 'GRAPHICS',     value: 'HIGH',    values: ['LOW', 'MEDIUM', 'HIGH'] },
            { label: 'CONTROLS',     value: 'DEFAULT', values: ['DEFAULT', 'CUSTOM'] },
            { label: 'SCREEN SHAKE', value: GameSettings.screenShake   ? 'ON' : 'OFF',
              values: ['ON', 'OFF'],
              onChange: v => { GameSettings.screenShake   = (v === 'ON'); GameSettings.save(); } },
            { label: 'EXPLOSIONS',   value: GameSettings.explosions    ? 'ON' : 'OFF',
              values: ['ON', 'OFF'],
              onChange: v => { GameSettings.explosions    = (v === 'ON'); GameSettings.save(); } },
            { label: 'PERF PANEL',   value: GameSettings.showPerfPanel ? 'ON' : 'OFF',
              values: ['ON', 'OFF'],
              onChange: v => { GameSettings.showPerfPanel = (v === 'ON'); GameSettings.save(); } },
        ];

        this.settingValues = {};
        const dividerIdx = 3;
        const rowStartY  = cy - 88;
        const rowSpacing = 50;

        settings.forEach((s, i) => {
            const ry = rowStartY + i * rowSpacing;
            if (i === dividerIdx) {
                this.add.graphics()
                    .lineStyle(1, 0x00ffe7, 0.18)
                    .lineBetween(cx - 180, ry - 14, cx + 180, ry - 14);
                this.add.text(cx - 170, ry - 22, 'GAMEPLAY', {
                    fontFamily:    '"Courier New", monospace',
                    fontSize:      '9px',
                    color:         '#00ffe7',
                    letterSpacing: 4,
                    alpha:         0.45,
                }).setOrigin(0, 1);
            }
            this.add.rectangle(cx, ry, 360, 40, 0x001a2a, 0.9)
                .setStrokeStyle(1, 0x00ffe7, 0.12);
            this.add.text(cx - 140, ry, s.label, {
                fontFamily: '"Courier New", monospace',
                fontSize: '13px',
                color: '#4ecdc4',
                letterSpacing: 3,
            }).setOrigin(0, 0.5);
            const leftArr = this.add.text(cx + 40, ry, '◄', {
                fontFamily: '"Courier New", monospace',
                fontSize: '13px',
                color: '#00ffe7',
            }).setOrigin(0.5).setInteractive({ useHandCursor: true });
            const valText = this.add.text(cx + 82, ry, s.value, {
                fontFamily: '"Courier New", monospace',
                fontSize: '13px',
                color: '#ffffff',
                letterSpacing: 2,
            }).setOrigin(0.5);
            const rightArr = this.add.text(cx + 124, ry, '►', {
                fontFamily: '"Courier New", monospace',
                fontSize: '13px',
                color: '#00ffe7',
            }).setOrigin(0.5).setInteractive({ useHandCursor: true });
            let idx = s.values.indexOf(s.value);
            this.settingValues[s.label] = s.value;
            const update = () => {
                const v = s.values[idx];
                valText.setText(v);
                this.settingValues[s.label] = v;
                if (s.onChange) s.onChange(v);
                this.tweens.add({ targets: valText, alpha: 0.2, duration: 60, yoyo: true });
            };
            leftArr.on('pointerdown',  () => { idx = (idx - 1 + s.values.length) % s.values.length; update(); });
            rightArr.on('pointerdown', () => { idx = (idx + 1) % s.values.length; update(); });
            [leftArr, rightArr].forEach(btn => {
                btn.on('pointerover', () => btn.setStyle({ color: '#ffffff' }));
                btn.on('pointerout',  () => btn.setStyle({ color: '#00ffe7' }));
            });
        });

        const backY  = rowStartY + settings.length * rowSpacing + 22;
        const backBg = this.add.rectangle(cx, backY, 160, 42, 0x001a2a)
            .setStrokeStyle(1, 0x00ffe7, 0.6)
            .setInteractive({ useHandCursor: true });
        const backLabel = this.add.text(cx, backY, '← BACK', {
            fontFamily: '"Courier New", monospace',
            fontSize: '16px',
            color: '#00ffe7',
            letterSpacing: 4,
        }).setOrigin(0.5);
        backBg.on('pointerover', () => {
            backBg.setFillStyle(0x00ffe7, 0.15);
            backLabel.setStyle({ color: '#ffffff' });
        });
        backBg.on('pointerout', () => {
            backBg.setFillStyle(0x001a2a);
            backLabel.setStyle({ color: '#00ffe7' });
        });
        backBg.on('pointerdown', () => {
            this.cameras.main.fade(200, 0, 0, 0);
            this.time.delayedCall(200, () => this.scene.start('OpeningScreen'));
        });

        this.time.addEvent({
            delay: Phaser.Math.Between(3000, 6000),
            callback: () => {
                this.cameras.main.setAlpha(0.85);
                this.time.delayedCall(60, () => this.cameras.main.setAlpha(1));
            },
            loop: true,
        });

        this.cameras.main.fadeIn(300, 0, 0, 0);
    }

    _drawCorners(cx, cy, w, h) {
        const g    = this.add.graphics();
        g.lineStyle(2, 0x00ffe7, 0.7);
        const size = 22, pad = 16;
        [[pad, pad, 1, 1], [w-pad, pad, -1, 1], [pad, h-pad, 1, -1], [w-pad, h-pad, -1, -1]]
            .forEach(([x, y, dx, dy]) => {
                g.beginPath();
                g.moveTo(x, y + dy*size); g.lineTo(x, y); g.lineTo(x + dx*size, y);
                g.strokePath();
            });
    }
}
